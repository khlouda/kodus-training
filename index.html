<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kodus Training</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; }

:root {
  --brand: #634DB3;
  --brand-light: #7761d0;
  --brand-dim: rgba(99,77,179,0.25);
  --surface: rgba(255,255,255,0.045);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.09);
  --border-strong: rgba(255,255,255,0.15);
  --text: #e8e6f0;
  --text-dim: rgba(255,255,255,0.45);
  --text-faint: rgba(255,255,255,0.25);
  --bg: #0f0e17;
  --bg-elevated: #17162a;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.t-display { font-family: Georgia, serif; letter-spacing: -0.025em; }
.t-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }

.btn-primary {
  background: linear-gradient(135deg, #7761d0 0%, #634DB3 60%, #5241a0 100%);
  box-shadow: 0 4px 20px rgba(99,77,179,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
  color: white; border: none; cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,77,179,0.6), inset 0 1px 0 rgba(255,255,255,0.12); }
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  background: var(--surface); border: 1px solid var(--border);
  color: #c4bde8; cursor: pointer;
  transition: background 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-ghost:hover { background: var(--surface-hover); }
.btn-ghost:active { transform: scale(0.97); }

.btn-green {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  box-shadow: 0 4px 16px rgba(34,197,94,0.35);
  color: white; border: none; cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-green:hover { transform: translateY(-1px); }
.btn-green:active { transform: scale(0.97); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
.card-elevated { background: rgba(255,255,255,0.065); border: 1px solid var(--border-strong); border-radius: 16px; padding: 18px; }

.input {
  background: rgba(255,255,255,0.055);
  border: 1.5px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 11px 14px;
  width: 100%;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input:focus { border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(99,77,179,0.18); }
.input::placeholder { color: var(--text-faint); }
textarea.input { resize: none; line-height: 1.55; }

.chips-row { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  display: inline-flex; align-items: center; white-space: nowrap;
  padding: 7px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: #c4bde8; cursor: pointer;
  transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink: 0;
}
.chip:hover { border-color: rgba(99,77,179,0.5); background: var(--brand-dim); }
.chip:active { transform: scale(0.94); }
.chip.selected {
  background: rgba(99,77,179,0.3);
  border-color: var(--brand-light);
  color: white;
  box-shadow: 0 0 0 2px rgba(99,77,179,0.2);
}

.type-btn {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 16px; padding: 18px 10px;
  text-align: center; cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  color: #c4bde8;
}
.type-btn:hover { border-color: rgba(99,77,179,0.4); background: rgba(99,77,179,0.1); }
.type-btn.active {
  background: rgba(99,77,179,0.22);
  border-color: var(--brand-light);
  color: white;
  box-shadow: 0 0 0 3px rgba(99,77,179,0.15), 0 4px 20px rgba(99,77,179,0.25);
}

.section-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px; overflow: hidden; }
.section-card-head {
  background: linear-gradient(135deg, rgba(99,77,179,0.2), rgba(82,65,160,0.12));
  border-bottom: 1px solid rgba(99,77,179,0.18);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}

.ex-pick-btn {
  width: 100%; padding: 14px 16px; border-radius: 13px;
  background: rgba(255,255,255,0.04); border: 1.5px dashed rgba(255,255,255,0.15);
  color: var(--text-dim); font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  transition: all 0.2s;
}
.ex-pick-btn.filled {
  background: rgba(99,77,179,0.12); border-style: solid;
  border-color: rgba(99,77,179,0.35); color: white; font-weight: 600;
}
.ex-pick-btn:hover { background: rgba(99,77,179,0.15); border-color: rgba(99,77,179,0.45); }

.stype-btn {
  flex: 1; padding: 16px 8px; border-radius: 14px;
  border: 2px solid var(--border); background: var(--surface);
  text-align: center; cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  min-height: 72px;
}
.stype-btn:hover { border-color: rgba(99,77,179,0.45); background: rgba(99,77,179,0.1); }
.stype-btn.active { background: rgba(99,77,179,0.22); border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(99,77,179,0.15); }

.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  z-index: 300; opacity: 0; pointer-events: none;
  backdrop-filter: blur(4px);
  transition: opacity 0.28s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1c1a2e; border-radius: 24px 24px 0 0;
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  max-height: 82vh; display: flex; flex-direction: column;
  box-shadow: 0 -12px 60px rgba(0,0,0,0.6);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 14px auto 0; flex-shrink: 0; }
.sheet-search-wrap { padding: 14px 16px 10px; flex-shrink: 0; }
.sheet-list { overflow-y: auto; flex: 1; padding: 0 16px 40px; }
.sheet-item {
  padding: 13px 14px; border-radius: 12px; cursor: pointer;
  font-size: 15px; color: #c4bde8; display: flex; align-items: center; gap: 10px;
  transition: background 0.12s;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.sheet-item:hover, .sheet-item:active { background: rgba(99,77,179,0.2); color: white; }
.sheet-item.custom-item { color: #9988de; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 4px; }
.sheet-section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-faint); padding: 12px 14px 6px; }

.tog { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
.tog input { opacity: 0; width: 0; height: 0; position: absolute; }
.tog-sl { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.1); border-radius: 26px; border: 1px solid var(--border); transition: 0.25s; }
.tog-sl:before { content: ''; position: absolute; height: 20px; width: 20px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
input:checked + .tog-sl { background: var(--brand); border-color: var(--brand); }
input:checked + .tog-sl:before { transform: translateX(20px); }

.cv-card { background: rgba(255,255,255,0.048); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; box-shadow: 0 6px 28px rgba(0,0,0,0.28); }
.cv-head { background: linear-gradient(135deg, rgba(99,77,179,0.38), rgba(82,65,160,0.22)); border-bottom: 1px solid rgba(99,77,179,0.22); padding: 15px 18px; }
.reps-badge { display: inline-flex; align-items: center; background: rgba(99,77,179,0.22); border: 1px solid rgba(99,77,179,0.38); border-radius: 9px; padding: 5px 12px; font-weight: 700; color: #c4bde8; font-size: 15px; }
.complete-chk { width: 24px; height: 24px; border-radius: 7px; border: 2px solid rgba(255,255,255,0.2); background: transparent; cursor: pointer; appearance: none; -webkit-appearance: none; flex-shrink: 0; transition: all 0.2s; }
.complete-chk:checked { background: var(--brand); border-color: var(--brand); background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='1,5 4,9 11,1' stroke='white' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: center; background-size: 12px; }

.nav-tab { padding: 9px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-dim); border: 1px solid transparent; }
.nav-tab.active { background: rgba(99,77,179,0.22); color: white; border-color: rgba(99,77,179,0.35); }
.nav-tab:hover:not(.active) { color: var(--text); background: var(--surface-hover); }

.streak-dot { width: 33px; height: 33px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.sd-done { background: var(--brand); color: white; box-shadow: 0 0 14px rgba(99,77,179,0.5); }
.sd-today { border: 2px solid var(--brand); color: #9988de; }
.sd-empty { background: rgba(255,255,255,0.055); color: var(--text-faint); }
.sd-missed { background: rgba(239,68,68,0.18); border: 2px solid rgba(239,68,68,0.45); color: #f87171; }
.sd-rest { background: rgba(255,255,255,0.03); color: var(--text-faint); border: 1px solid var(--border); }

.timer-num { font-family: Georgia, serif; font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
.expand-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: rgba(99,77,179,0.9); cursor: pointer; padding: 4px 0; border: none; background: none; }
.expand-link:hover { color: var(--brand-light); }

.add-section-btn {
  width: 100%; padding: 15px; border-radius: 15px;
  border: 2px dashed rgba(99,77,179,0.35); background: rgba(99,77,179,0.06);
  color: #9988de; font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.add-section-btn:hover { background: rgba(99,77,179,0.12); border-color: rgba(99,77,179,0.55); color: white; }
.add-section-btn:active { transform: scale(0.98); }

.warmup-item-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; }

/* Weight input */
.weight-input {
  background: rgba(99,77,179,0.1);
  border: 1.5px solid rgba(99,77,179,0.3);
  color: var(--text); border-radius: 10px;
  padding: 8px 12px; font-size: 14px; font-weight: 600;
  width: 100px; outline: none; font-family: 'Inter', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.weight-input:focus { border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(99,77,179,0.18); }
.weight-input::placeholder { color: var(--text-faint); font-weight: 400; }

/* PR badge */
.pr-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, rgba(251,191,36,0.25), rgba(245,158,11,0.15));
  border: 1px solid rgba(251,191,36,0.45);
  border-radius: 8px; padding: 3px 9px;
  font-size: 11px; font-weight: 800; color: #fbbf24;
  letter-spacing: 0.05em; text-transform: uppercase;
  animation: prPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes prPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* Week strip */
.week-strip-day {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex: 1; min-width: 0;
}
.week-day-dot {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
  transition: all 0.2s;
}
.wdd-rest { background: rgba(255,255,255,0.03); color: var(--text-faint); border: 1px solid var(--border); }
.wdd-done { background: var(--brand); color: white; box-shadow: 0 0 12px rgba(99,77,179,0.5); }
.wdd-missed { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.35); }
.wdd-today { border: 2px solid var(--brand-light); color: #9988de; background: rgba(99,77,179,0.12); }
.wdd-future { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }

/* Collapsible */
.collapsible-content { overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; }
.collapsible-content.collapsed { max-height: 0 !important; opacity: 0; }

/* Today banner */
.today-banner {
  background: linear-gradient(135deg, rgba(99,77,179,0.28) 0%, rgba(82,65,160,0.18) 100%);
  border: 1.5px solid rgba(99,77,179,0.4);
  border-radius: 18px; padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between;
}

/* Calendar */
.cal-day {
  aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; cursor: default;
}
.cal-done { background: rgba(99,77,179,0.35); color: white; }
.cal-missed { background: rgba(239,68,68,0.2); color: #f87171; }
.cal-rest { background: rgba(255,255,255,0.03); color: var(--text-faint); }
.cal-future { background: rgba(255,255,255,0.04); color: var(--text-faint); opacity: 0.4; }
.cal-today { border: 2px solid var(--brand-light); color: white; }
.cal-header-day { font-size: 10px; font-weight: 700; color: var(--text-faint); text-align: center; letter-spacing: 0.05em; text-transform: uppercase; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(99,77,179,0.35); border-radius: 3px; }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp 0.25s ease; }

@media print {
  body { background: white !important; color: black !important; }
  .no-print { display: none !important; }
  .cv-card { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; }
  .cv-head { background: #f5f3ff !important; }
  .reps-badge { background: #f5f3ff !important; color: #634DB3 !important; }
}
</style>
</head>
<body>

<!-- Bottom sheet -->
<div id="sheet-overlay" class="sheet-overlay" onclick="closePicker()"></div>
<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-search-wrap">
    <input type="search" id="sheet-search" class="input" placeholder="Search exercises…" oninput="filterSheet(this.value)" autocomplete="off" autocorrect="off">
  </div>
  <div id="sheet-list" class="sheet-list"></div>
</div>

<div id="app" style="width:100%;min-height:100vh"></div>
<div id="fb-status" style="display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(99,77,179,0.92);color:#fff;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;z-index:9999;letter-spacing:0.02em;pointer-events:none"></div>

<script>
// ============================================================
// FIREBASE
// ============================================================
const _fbConfig = {
  apiKey: "AIzaSyBfwNldlCUCsQa7F3mt-MoNq9qMEiAlbtg",
  authDomain: "workout-tracker-47b2d.firebaseapp.com",
  projectId: "workout-tracker-47b2d",
  storageBucket: "workout-tracker-47b2d.firebasestorage.app",
  messagingSenderId: "346319871188",
  appId: "1:346319871188:web:4f8915abd6ee1fbc3fef41"
};
if (!firebase.apps.length) firebase.initializeApp(_fbConfig);
const db = firebase.firestore();

function showFbStatus(msg, isError) {
  const el = document.getElementById('fb-status');
  if (!el) return;
  el.textContent = msg;
  el.style.background = isError ? 'rgba(220,38,38,0.92)' : 'rgba(99,77,179,0.92)';
  el.style.display = 'block';
  if (!isError) setTimeout(() => { el.style.display = 'none'; }, 2500);
}

function initFirestoreListeners() {
  showFbStatus('⟳ Connecting…', false);

  // Workouts collection — one doc per date
  db.collection('workouts').onSnapshot(snap => {
    const ids = new Set();
    snap.forEach(doc => { S.savedWorkouts[doc.id] = doc.data(); ids.add(doc.id); });
    // Remove locally any workouts deleted remotely
    Object.keys(S.savedWorkouts).forEach(k => { if (!ids.has(k)) delete S.savedWorkouts[k]; });
    localStorage.setItem('kodus_workouts', JSON.stringify(S.savedWorkouts));
    if (S.view !== 'coach') render();
  }, err => { showFbStatus('⚠ Sync error', true); console.error('workouts snap', err); });

  // Weights collection — one doc per date
  db.collection('weights').onSnapshot(snap => {
    snap.forEach(doc => { localStorage.setItem('kodus_wt_' + doc.id, JSON.stringify(doc.data())); });
    if (S.view !== 'coach') render();
  }, err => { console.error('weights snap', err); });

  // Videos settings doc
  db.collection('settings').doc('videos').onSnapshot(doc => {
    if (doc.exists) {
      S.videoLibrary = doc.data() || {};
      localStorage.setItem('kodus_videos', JSON.stringify(S.videoLibrary));
      if (S.view === 'videos') render();
    }
  }, err => { console.error('videos snap', err); });

  // Preferences settings doc
  db.collection('settings').doc('preferences').onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      if (data.libraries) {
        S.libraries = data.libraries;
        S.libraries.warmup = [...LIBRARIES.warmup];
        localStorage.setItem('kodus_libraries', JSON.stringify(S.libraries));
      }
      if (data.prs) localStorage.setItem('kodus_pr', JSON.stringify(data.prs));
      if (data.done) localStorage.setItem('kodus_done', JSON.stringify(data.done));
      if (data.completions) {
        Object.keys(data.completions).forEach(date => {
          localStorage.setItem('kodus_complete_' + date, JSON.stringify(data.completions[date]));
        });
      }
      if (S.view === 'client') render();
    }
  }, err => { console.error('prefs snap', err); });
}

// ============================================================
// CONSTANTS
// ============================================================
const LIBRARIES = {
  shoulders:    ['Dumbbell shoulder press neutral grip','Dumbbell shoulder press','Ez bar supinated shoulder press','Barbell front raises supinated','Front raises barbell wide grip','Front raises DBs alternating','Barbell upright row','Seated dumbbell lateral raises','Cable lateral raises','Dumbbell rear delt fly','Face pulls cable','Dumbbell shrugs','Arnold press','Behind the neck press','Scapula push ups','Shoulder taps','Band pull aparts','Plank walk outs'],
  back_triceps: ['Pull ups','Barbell bent over row','Chest supported dumbbell row incline bench','Seated row cable','Single arm dumbbell row','High row cable','Straight arm cable pulldown','Lat pulldown','Back extension','Dumbbell skull crusher','Dumbbell skull crusher neutral grip','Tricep pushdown rope','Tricep pushdown cable','Overhead tricep extension cable','Diamond push ups','Close grip bench press'],
  chest_biceps: ['Incline smith bench press','Incline dumbbell press','Dumbbell chest press flat','Decline chest press machine','Incline chest fly','Butterfly machine fly','Standing cable crossover','Cable cross high to low','Cable cross low to high','Dumbbell chest pullover','Push ups','Dips','Dumbbell bicep curls','Barbell curl','Hammer curls alternating','Rope hammer curls','Single arm incline dumbbell preacher curl','Incline dumbbell curl','Band pull aparts','Shoulder taps','Plank walk outs',"World's greatest stretch"],

function loadState() {
  try { S.savedWorkouts = JSON.parse(localStorage.getItem('kodus_workouts') || '{}'); } catch(e){}
  try {
    const l = localStorage.getItem('kodus_libraries');
    S.libraries = l ? JSON.parse(l) : JSON.parse(JSON.stringify(LIBRARIES));
  } catch(e) { S.libraries = JSON.parse(JSON.stringify(LIBRARIES)); }
  // Always sync warmup library from code (clears any stale localStorage data)
  S.libraries.warmup = [...LIBRARIES.warmup];
  saveLibraries();
  try { S.videoLibrary = JSON.parse(localStorage.getItem('kodus_videos') || '{}'); } catch(e) { S.videoLibrary = {}; }
}
function saveWorkouts()    { localStorage.setItem('kodus_workouts',  JSON.stringify(S.savedWorkouts)); }
function saveLibraries()  {
  localStorage.setItem('kodus_libraries', JSON.stringify(S.libraries));
  db.collection('settings').doc('preferences').set({ libraries: S.libraries }, { merge: true })
    .catch(e => console.error('saveLibraries fb', e));
}

function todayKey() { return new Date().toISOString().slice(0,10); }
function getTodayWorkout() { return S.savedWorkouts[todayKey()] || null; }

function getTodayScheduledType() {
  return WEEKLY_SCHEDULE[new Date().getDay()] || 'rest';
}

// Mark workout done
function isWorkoutDone(dateKey) {
  try { return !!(JSON.parse(localStorage.getItem('kodus_done') || '{}')[dateKey]); } catch(e){ return false; }
}
function markWorkoutDone(dateKey, val) {
  try {
    const d = JSON.parse(localStorage.getItem('kodus_done') || '{}');
    d[dateKey] = val;
    localStorage.setItem('kodus_done', JSON.stringify(d));
    db.collection('settings').doc('preferences').set({ done: d }, { merge: true })
      .catch(e => console.error('markWorkoutDone fb', e));
  } catch(e){}
}

// Weight tracking
function getWeightLog(dateKey) {
  try { return JSON.parse(localStorage.getItem('kodus_wt_' + dateKey) || '{}'); } catch(e){ return {}; }
}
function logWeight(dateKey, exerciseName, weight) {
  const log = getWeightLog(dateKey);
  log[exerciseName] = weight;
  localStorage.setItem('kodus_wt_' + dateKey, JSON.stringify(log));
  db.collection('weights').doc(dateKey).set(log)
    .catch(e => console.error('logWeight fb', e));
  // Update PRs
  const prs = getPRs();
  const current = parseFloat(weight);
  if (!isNaN(current) && current > 0) {
    if (!prs[exerciseName] || current > prs[exerciseName].weight) {
      prs[exerciseName] = { weight: current, date: dateKey };
      localStorage.setItem('kodus_pr', JSON.stringify(prs));
      db.collection('settings').doc('preferences').set({ prs }, { merge: true })
        .catch(e => console.error('logWeight prs fb', e));
    }
  }
}
function getPRs() {
  try { return JSON.parse(localStorage.getItem('kodus_pr') || '{}'); } catch(e){ return {}; }
}
function isPR(exerciseName, weight) {
  const prs = getPRs();
  const current = parseFloat(weight);
  if (isNaN(current) || current <= 0) return false;
  const pr = prs[exerciseName];
  return pr && current >= pr.weight && pr.date === todayKey();
}

// Last session for a workout type
function getLastSession(type) {
  const today = todayKey();
  const dates = Object.keys(S.savedWorkouts)
    .filter(d => d < today && S.savedWorkouts[d].type === type)
    .sort().reverse();
  return dates.length ? { workout: S.savedWorkouts[dates[0]], date: dates[0] } : null;
}

// ============================================================
// WEEK STRIP DATA
// ============================================================
function getWeekStrip() {
  const today = new Date();
  const todayStr = todayKey();
  // Get Monday of this week
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

  return Array.from({length: 7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const key = d.toISOString().slice(0, 10);
    const dow = d.getDay();
    const scheduledType = WEEKLY_SCHEDULE[dow] || 'rest';
    const isToday = key === todayStr;
    const isPast = d < today && !isToday;
    const isRest = scheduledType === 'rest';
    const done = isWorkoutDone(key);
    const isMissed = !isRest && isPast && !done;
    const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    return { key, dow, label: dayLabels[dow], isToday, isPast, isRest, done, isMissed, scheduledType };
  });
}

function renderWeekStrip() {
  const days = getWeekStrip();
  const completedCount = days.filter(d => d.done).length;
  const workoutDays = days.filter(d => !d.isRest).length;

  return `<div class="card no-print" style="margin-bottom:14px;padding:14px 16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:11px">
      <div class="t-label">This Week</div>
      <div style="font-size:12px;font-weight:700;color:#9988de">${completedCount}/${workoutDays} done</div>
    </div>
    <div style="display:flex;gap:4px">
      ${days.map(d => {
        let cls = 'wdd-future';
        let content = TYPE_ABBREV[d.scheduledType] || '—';
        if (d.isRest) { cls = 'wdd-rest'; content = '—'; }
        else if (d.done) cls = 'wdd-done';
        else if (d.isMissed) cls = 'wdd-missed';
        else if (d.isToday) cls = 'wdd-today';

        return `<div class="week-strip-day">
          <div class="week-day-dot ${cls}" style="${d.isToday?'box-shadow:0 0 0 2px #634DB3;':''}">${content}</div>
          <span style="font-size:9px;color:${d.isToday?'#9988de':'var(--text-faint)'};font-weight:${d.isToday?'700':'500'}">${d.label}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function parseRestSeconds(str) {
  if (!str || str === '—') return 60;
  const min = str.match(/(\d+)\s*min/i);
  if (min) return parseInt(min[1]) * 60;
  const sec = str.match(/(\d+)/);
  return sec ? Math.max(10, parseInt(sec[1])) : 60;
}

function sectionTimerHtml(idx, restStr) {
  const total = parseRestSeconds(restStr);
  const isActive = S.timer.sIdx === idx;
  const remaining = isActive ? S.timer.remaining : total;
  const isRunning = isActive && S.timer.running;
  const isDone = isActive && !S.timer.running && S.timer.remaining <= 0;
  const m = Math.floor(remaining / 60), s = remaining % 60;
  const timeStr = `${m}:${s.toString().padStart(2,'0')}`;
  const timeColor = (isActive && remaining < 10 && remaining > 0) ? '#f87171' : 'white';
  const btnText = isDone ? 'Done ✓' : (isRunning ? 'Pause' : (isActive && remaining < total ? 'Resume' : 'Start'));
  const btnBg = isDone ? 'rgba(34,197,94,0.15)' : 'rgba(99,77,179,0.5)';
  const btnColor = isDone ? '#4ade80' : 'white';
  const statusText = isDone ? 'Rest done! ✓' : (isRunning ? 'resting…' : 'rest');
  const statusColor = isDone ? '#4ade80' : '#9988de';
  return `<div id="sec-timer-${idx}" style="margin-top:14px;padding:10px 14px;background:rgba(99,77,179,0.07);border:1px solid rgba(99,77,179,0.18);border-radius:12px;display:flex;align-items:center;gap:12px">

    <span id="sec-timer-status-${idx}" style="font-size:12px;color:${statusColor};flex:1">${statusText}</span>
    <button id="sec-timer-btn-${idx}" onclick="startSectionTimer(${idx})"
      style="padding:8px 20px;background:${btnBg};border:none;border-radius:9px;color:${btnColor};font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;min-width:76px;-webkit-tap-highlight-color:transparent;touch-action:manipulation">${btnText}</button>

}

function renderHistoryCalendar() {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDow = firstDay.getDay(); // 0=Sun

  const monthName = today.toLocaleDateString('en-GB', {month:'long', year:'numeric'});
  const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  let cells = '';
  // Empty cells before first day
  for (let i = 0; i < startDow; i++) cells += `<div></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const key = dateObj.toISOString().slice(0, 10);
    const dow = dateObj.getDay();
    const scheduledType = WEEKLY_SCHEDULE[dow] || 'rest';
    const isToday = key === todayKey();
    const isPast = dateObj < today || isToday;
    const isRest = scheduledType === 'rest';
    const done = isWorkoutDone(key);
    const isFuture = dateObj > today;

    let cls = 'cal-future';
    let title = '';
    if (isRest && !isFuture) { cls = 'cal-rest'; title = 'REST'; }
    else if (done) { cls = 'cal-done'; title = '✓'; }
    else if (!isRest && isPast && !isToday) { cls = 'cal-missed'; title = '✗'; }
    else if (isToday) { cls = 'cal-today'; title = d; }
    else { cls = 'cal-future'; }

    cells += `<div class="cal-day ${cls}" title="${TYPE_ABBREV[scheduledType]||''}">${title || d}</div>`;
  }

  return `<div style="margin-top:12px">
    <div style="text-align:center;font-size:13px;font-weight:700;color:white;margin-bottom:10px">${monthName}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
      ${dayLabels.map(l=>`<div class="cal-header-day">${l}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:rgba(99,77,179,0.35)"></div><span style="font-size:11px;color:var(--text-dim)">Done</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:rgba(239,68,68,0.2)"></div><span style="font-size:11px;color:var(--text-dim)">Missed</span></div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;border-radius:3px;background:rgba(255,255,255,0.03)"></div><span style="font-size:11px;color:var(--text-dim)">Rest</span></div>
    </div>
  </div>`;
}

    <button onclick="saveWorkout()" id="save-btn" class="btn-primary" style="width:100%;padding:14px;border-radius:13px;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px">
      💾 Save Workout
    </button>
    ${S.savedWorkouts[todayKey()]?`<p style="text-align:center;color:var(--text-faint);font-size:11px">Last saved: ${todayKey()}</p>`:''}
  </div>`;

  return h;
}

function builderMainHtml() {
  const { w, lastSession } = _builderMeta();
  let h = '';

  if (!w.type) {
    return `<div class="card" style="text-align:center;padding:60px 20px;color:var(--text-dim)">Select a workout type in the sidebar to get started.</div>`;
  }

  if (w.type === 'rest') {
    return `<div class="card" style="text-align:center;padding:48px;margin-bottom:14px">
      <div style="font-size:44px;margin-bottom:12px">😴</div>
      <div style="font-size:18px;font-weight:700;color:white;margin-bottom:6px">Rest Day</div>
      <p style="color:var(--text-dim);font-size:14px;margin-bottom:16px">Recovery is part of the program.</p>
      <textarea class="input" rows="3" placeholder="Coach note (optional)…" oninput="S.workout.coachNote=this.value" style="text-align:left">${esc(w.coachNote)}</textarea>
      <button onclick="saveWorkout()" class="btn-primary" style="margin-top:14px;width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700">Save Rest Day</button>
    </div>`;
  }

  /* Warmup */
  h += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      ${stepBadge(1)} <span style="font-size:15px;font-weight:700;color:white">🔥 Warm Up</span>
    </div>
    <div style="margin-bottom:12px">
      <div class="t-label" style="margin-bottom:7px">Format / Note</div>
      <input type="text" class="input" placeholder="e.g. 3 sets, increase effort" value="${esc(w.warmupNote)}" oninput="S.workout.warmupNote=this.value">
    </div>
    <div class="t-label" style="margin-bottom:8px">Exercises</div>
    <div style="display:flex;flex-direction:column;gap:7px">
      ${(w.warmupItems||[]).map((item,i)=>{
        const wuList = S.libraries.warmup || [];
        return `
      <div class="warmup-item-row">
        <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow:hidden">
          <span style="font-size:14px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.name)}</span>
          <div style="position:relative;flex-shrink:0">
            <select onchange="S.workout.warmupItems[${i}].name=this.value;render()"
              style="appearance:none;-webkit-appearance:none;padding:3px 18px 3px 8px;background:rgba(99,77,179,0.15);border:1px solid rgba(99,77,179,0.3);border-radius:7px;color:#c4bde8;font-size:11px;font-weight:600;cursor:pointer;outline:none;max-width:90px">
              <option value="" disabled selected>change</option>
              ${wuList.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')}
            </select>
            <span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);color:#9988de;font-size:9px;pointer-events:none">▾</span>
          </div>
        </div>
        <input type="text" value="${esc(item.setsReps)}" placeholder="" oninput="S.workout.warmupItems[${i}].setsReps=this.value"
          style="width:88px;padding:7px 10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;outline:none;flex-shrink:0;text-align:center">
        <button onclick="removeWarmupItem(${i})" style="width:28px;height:28px;border-radius:7px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:13px;cursor:pointer;flex-shrink:0">✕</button>
      </div>`;
      }).join('')}
    </div>
    <button onclick="openPicker('warmup')" class="btn-ghost" style="width:100%;margin-top:10px;padding:11px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px">
      <span style="font-size:16px;color:#634DB3">+</span> Add Warmup Exercise
    </button>
  </div>`;

  /* Global rest */
  const _restVals = (w.sections||[]).filter(s=>s.rest).map(s=>s.rest);
  const _globalRest = _restVals.length && _restVals.every(r=>r===_restVals[0]) ? _restVals[0] : (_restVals.length ? 'Mixed' : '');
  h += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:14px">⏱</span>
      <span style="font-size:14px;font-weight:700;color:white">Rest time for all sections</span>
      ${_globalRest?`<span style="margin-left:auto;font-size:12px;font-weight:700;color:#9988de;background:rgba(99,77,179,0.15);border:1px solid rgba(99,77,179,0.3);border-radius:7px;padding:2px 9px">${esc(_globalRest)}</span>`:''}
    </div>
    <div class="chips-row">
      ${['60s','90s','2min','3min'].map(p=>`<button class="chip ${_globalRest===p?'selected':''}" onclick="setGlobalRest('${p}')">${p}</button>`).join('')}
    </div>
  </div>`;

  /* Sections */
  h += `<div style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      ${stepBadge(2)} <span style="font-size:15px;font-weight:700;color:white">Sections</span>
    </div>
    <div id="sections-list">
      ${(w.sections||[]).map((sec,i)=>renderSection(sec,i)).join('')}
    </div>
    <button class="add-section-btn" onclick="addSection()">
      <span style="font-size:20px">+</span>
      Add Section ${SECTION_LETTERS[(w.sections||[]).length]||''}
    </button>
  </div>`;

  /* Finisher */
  h += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">${stepBadge(3)} <span style="font-size:15px;font-weight:700;color:white">⚡ Finisher</span></div>
      <label class="tog"><input type="checkbox" ${w.finisherEnabled?'checked':''} onchange="S.workout.finisherEnabled=this.checked;render()"><span class="tog-sl"></span></label>
    </div>
    ${w.finisherEnabled ? `
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
      <div>
        <div class="t-label" style="margin-bottom:7px">Rounds / Format</div>
        <input type="text" class="input" placeholder="e.g. 4 rounds" value="${esc(w.finisherRounds)}" oninput="S.workout.finisherRounds=this.value">
      </div>
      <div>
        <div class="t-label" style="margin-bottom:7px">Exercises</div>
        <textarea class="input" rows="3" placeholder="e.g. 12 cals ski / 10 burpees / 200m run" oninput="S.workout.finisherExercises=this.value">${esc(w.finisherExercises)}</textarea>
      </div>
    </div>` : ''}
  </div>`;

  /* Coach Note */
  h += `<div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">${stepBadge(4)} <span style="font-size:15px;font-weight:700;color:white">📝 Note to Khaled</span></div>
    <textarea class="input" rows="3" placeholder="e.g. Focus on form today, not weight." oninput="S.workout.coachNote=this.value">${esc(w.coachNote)}</textarea>
  </div>`;

  return h;
}

// ============================================================
// BUILDER — mobile (stacks sidebar meta + form)
// ============================================================
function renderBuilder() {
  const { w, lastSession } = _builderMeta();
  const todayType = getTodayScheduledType();
  const ti = WORKOUT_TYPES.find(t=>t.id===(w.type||todayType))||{label:'Select',icon:'💪'};
  let h = '';

  h += renderWeekStrip();
  h += `<div class="today-banner" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-size:30px">${ti.icon}</div>
      <div>
        <div class="t-label" style="margin-bottom:2px">Today's Workout</div>
        <div style="font-size:18px;font-weight:800;color:white">${ti.label}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:1px">${fmtDate(new Date())}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;align-items:flex-end">
      <button onclick="S.showTypeChooser=!S.showTypeChooser;render()" class="btn-ghost" style="padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700">Change</button>
      ${isWorkoutDone(todayKey())
        ? `<div style="font-size:11px;font-weight:700;color:#4ade80;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);padding:5px 10px;border-radius:8px">✓ Marked done</div>`
        : `<button onclick="coachMarkDone()" style="font-size:11px;font-weight:700;color:#4ade80;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);padding:5px 10px;border-radius:8px;cursor:pointer">Mark done</button>`
      }
    </div>
  </div>`;

  if (S.showTypeChooser) {
    h += `<div class="card" style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:white;margin-bottom:12px">Switch Workout Type</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${WORKOUT_TYPES.map(t=>`
        <button class="type-btn ${w.type===t.id?'active':''}" onclick="setWorkoutType('${t.id}')">
          <div style="font-size:22px;margin-bottom:4px">${t.icon}</div>
          <div style="font-size:12px;font-weight:700">${t.label}</div>
        </button>`).join('')}
      </div>
    </div>`;
  }

  if (!w.type) return h;

  // Mobile: last session panel + copy last
  if (w.type !== 'rest') {
    const lastSession = getLastSession(w.type);
    if (lastSession) {
      h += `<div class="card" style="margin-bottom:14px;border-color:rgba(99,77,179,0.25)">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="S.lastSessionOpen=!S.lastSessionOpen;rerenderLastSession()">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:14px">📋</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:white">Notes from Last Session</div>
              <div style="font-size:11px;color:var(--text-faint)">${lastSession.date}</div>
            </div>
          </div>
          <span id="last-arrow" style="font-size:13px;color:var(--text-faint)">${S.lastSessionOpen?'▲':'▼'}</span>
        </div>
        <div id="last-session-inner">${S.lastSessionOpen ? renderLastSessionContent(lastSession.workout) : ''}</div>
      </div>
      <button onclick="copyLastWorkout()" class="btn-ghost" style="width:100%;padding:13px;border-radius:13px;font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;border-color:rgba(99,77,179,0.3)">
        <span style="font-size:15px">🔄</span> Copy Last Workout (${lastSession.date})
      </button>`;
    }
  }

  // Delegate to shared form builder
  h += builderMainHtml();

  // Mobile save button (desktop has it in sidebar)
  if (w.type !== 'rest') {
    h += `<button onclick="saveWorkout()" id="save-btn" class="btn-primary" style="width:100%;padding:18px;border-radius:16px;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:4px">
      <span>💾</span> Save Workout
    </button>
    ${S.savedWorkouts[todayKey()]?`<p style="text-align:center;color:var(--text-faint);font-size:12px;margin-top:8px">Last saved: ${todayKey()}</p>`:''}`;
  }

  return h;
}

function renderLastSessionContent(w) {
  if (!w) return '';
  let h = `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">`;
  if (w.coachNote) h += `<div style="font-size:13px;color:#c4bde8;font-style:italic;margin-bottom:10px;padding:8px 10px;background:rgba(99,77,179,0.1);border-radius:8px">"${esc(w.coachNote)}"</div>`;
  (w.sections||[]).forEach(sec => {
    h += `<div style="margin-bottom:8px">
      <span style="font-size:11px;font-weight:700;color:#9988de;text-transform:uppercase;letter-spacing:0.05em">${sec.letter} — ${sec.sectionType}</span>`;
    (sec.exercises||[]).forEach(ex => {
      h += `<div style="font-size:13px;color:var(--text);padding:3px 0">${esc(ex.name)} <span style="color:var(--text-dim)">${esc(ex.setsReps)}</span></div>`;
    });
    h += `</div>`;
  });
  h += `</div>`;
  return h;
}

function rerenderLastSession() {
  const inner = document.getElementById('last-session-inner');
  const arrow = document.getElementById('last-arrow');
  const lastSession = getLastSession(S.workout?.type);
  if (inner) inner.innerHTML = S.lastSessionOpen ? renderLastSessionContent(lastSession?.workout) : '';
  if (arrow) arrow.textContent = S.lastSessionOpen ? '▲' : '▼';
}

function stepBadge(n) {
  return `<span style="min-width:24px;height:24px;padding:0 7px;background:rgba(99,77,179,0.3);border:1px solid rgba(99,77,179,0.4);color:#9988de;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">${n}</span>`;
}

function coachMarkDone() {
  markWorkoutDone(todayKey(), true);
  render();
}

// ============================================================
// SECTION RENDERER
// ============================================================
function renderSection(sec, idx) {
  const w = S.workout;
  const isFirst = idx === 0, isLast = idx === w.sections.length - 1;
  let h = `<div class="section-card fade-up" id="sec-${idx}" style="margin-bottom:10px">
    <div class="section-card-head">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="t-display" style="font-size:22px;font-weight:700;color:#9988de">${sec.letter}</span>
        <span style="font-size:13px;color:var(--text-dim)">${sec.sectionType ? (sec.sectionType.charAt(0).toUpperCase()+sec.sectionType.slice(1)) : 'Choose type'}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${!isFirst?`<button onclick="moveSection(${idx},-1)" style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">↑</button>`:''}
        ${!isLast?`<button onclick="moveSection(${idx},1)"  style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">↓</button>`:''}
        <button onclick="deleteSection(${idx})" style="width:30px;height:30px;border-radius:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    </div>
    <div style="padding:14px">`;

  /* Type picker — big tap-friendly buttons */
  h += `<div style="display:flex;gap:7px;margin-bottom:${sec.sectionType?'14px':'0'}">
    ${['single','superset','triset'].map(t=>{
      const labels = {single:'Single',superset:'Superset',triset:'Triset'};
      const sublabel = t==='single' ? sec.letter : t==='superset' ? `${sec.letter}1 + ${sec.letter}2` : `${sec.letter}1 + ${sec.letter}2 + ${sec.letter}3`;
      return `<button class="stype-btn ${sec.sectionType===t?'active':''}" onclick="setSectionType(${idx},'${t}')">
        <div style="font-size:10px;color:#9988de;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sublabel}</div>
        <div style="font-size:13px;font-weight:700;color:white">${labels[t]}</div>
      </button>`;
    }).join('')}
  </div>`;

  const SLOT_COLORS = ['#7C5CF6','#06B6D4','#F59E0B','#EC4899','#10B981','#F97316'];
  if (sec.sectionType) {
    sec.exercises.forEach((ex, ei) => {
      const slotLabel = sec.sectionType==='single' ? '' : `${sec.letter}${ei+1}`;
      const hasEx = !!ex.name;
      const accentColor = SLOT_COLORS[ei % SLOT_COLORS.length];
      const isMulti = sec.sectionType !== 'single';
      h += `<div style="margin-bottom:14px;${isMulti ? `background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-left:3px solid ${accentColor};border-radius:12px;padding:14px 14px 14px 16px` : ''}">
        ${slotLabel?`<div style="display:inline-flex;align-items:center;gap:6px;margin-bottom:10px;background:${accentColor}22;border:1px solid ${accentColor}55;border-radius:7px;padding:3px 10px 3px 8px">
          <div style="width:7px;height:7px;border-radius:50%;background:${accentColor}"></div>
          <span style="font-size:11px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:${accentColor}">${slotLabel}</span>
        </div>`:''}
        <button class="ex-pick-btn ${hasEx?'filled':''}" onclick="openPicker('exercise',${idx},${ei})">
          ${hasEx ? `<span style="font-size:15px">🏋️</span><span style="flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ex.name)}</span>${S.videoLibrary[ex.name]?'<span style="font-size:13px;flex-shrink:0" title="Video linked">🎥</span>':''}<span style="font-size:12px;color:#9988de;flex-shrink:0">Change ›</span>`
                  : `<span style="font-size:18px;color:rgba(99,77,179,0.6)">+</span><span>Pick exercise…</span>`}
        </button>
        ${hasEx ? `
        <div style="margin-top:10px">
          <div class="t-label" style="margin-bottom:8px">Sets × Reps</div>
          <div class="chips-row" style="margin-bottom:8px">
            ${REPS_PRESETS.map(p => p === 'Custom'
              ? `<button class="chip ${!['3×8','3×10','3×12','4×8','4×10','4×12','5×5'].includes(ex.setsReps)&&ex.setsReps?'selected':''}" onclick="pickReps(${idx},${ei},'__custom__')">Custom</button>`
              : `<button class="chip ${ex.setsReps===p?'selected':''}" onclick="pickReps(${idx},${ei},'${p}')">${p}</button>`
            ).join('')}
          </div>
          ${(!['3×8','3×10','3×12','4×8','4×10','4×12','5×5'].includes(ex.setsReps))?`
          <input type="text" class="input" placeholder="e.g. 4 × 8/6/6/6 or 3×8" value="${esc(ex.setsReps)}"
            oninput="S.workout.sections[${idx}].exercises[${ei}].setsReps=this.value" style="font-size:14px;padding:9px 12px">`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
          <div>
            <button class="expand-link" onclick="toggleExField(${idx},${ei},'_showNote')" style="${ex._showNote?'color:#f87171;opacity:0.8':''}">${ex._showNote?'− Note':'+ Note'}</button>
            ${ex._showNote?`<div style="margin-top:6px"><input type="text" class="input" placeholder="Coach note for this exercise…" value="${esc(ex.coachNote||'')}" oninput="S.workout.sections[${idx}].exercises[${ei}].coachNote=this.value" style="font-size:13px;padding:9px 12px"></div>`:''}
          </div>
          <div>
            <button class="expand-link" onclick="toggleExField(${idx},${ei},'_showVideo')" style="${ex._showVideo?'color:#f87171;opacity:0.8':''}">${ex._showVideo?'− Video':'+ Video'}</button>
            ${ex._showVideo?`<div style="margin-top:6px"><input type="text" class="input" placeholder="YouTube URL…" value="${esc(ex.youtubeUrl||'')}" oninput="S.workout.sections[${idx}].exercises[${ei}].youtubeUrl=this.value" style="font-size:13px;padding:9px 12px"></div>`:''}
          </div>
        </div>
        `:''}
      </div>`;
    });

    /* Rest */
    h += `<div style="margin-top:4px">
      <div class="t-label" style="margin-bottom:8px">Rest between sets</div>
      <div class="chips-row">
        ${REST_PRESETS.map(p=>`<button class="chip ${sec.rest===p?'selected':''}" onclick="S.workout.sections[${idx}].rest='${p}';rerenderSection(${idx})">${p}</button>`).join('')}
      </div>
    </div>`;

    /* Section coach note */
    h += `<div style="margin-top:10px">
      <input type="text" class="input" placeholder="Section note (optional)…" value="${esc(sec.coachNote||'')}"
        oninput="S.workout.sections[${idx}].coachNote=this.value" style="font-size:13px;padding:9px 12px">
    </div>`;
  }

  h += `</div></div>`;
  return h;
}

// LIBRARY MANAGER

  const cats = { shoulders:'Shoulders', back_triceps:'Back & Triceps', chest_biceps:'Chest & Biceps', legs:'Leg Day', warmup:'Warmup', finisher:'Finisher' };

    <h2 class="t-display" style="font-size:18px;font-weight:700;color:white;margin-bottom:4px">Exercise Library</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:18px">Add, rename, or delete exercises</p>
    <div class="card-elevated" style="margin-bottom:16px">
      <div style="font-weight:700;font-size:14px;color:white;margin-bottom:10px">+ Add Exercise</div>
      <input type="text" id="lib-name" class="input" placeholder="Exercise name" style="margin-bottom:8px">
      <select id="lib-cat" class="input" style="margin-bottom:10px;background:#1c1a2e">${Object.entries(cats).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
      <button onclick="addLibEx()" class="btn-primary" style="width:100%;padding:12px;border-radius:12px;font-weight:700">Add</button>
    </div>
    ${Object.entries(cats).map(([cat,label])=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-weight:700;font-size:14px;color:#9988de">${label}</span>

        <button onclick="delLibEx('${cat}',${i})" style="padding:5px 8px;border-radius:7px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.18);color:#f87171;font-size:11px;cursor:pointer">✕</button>

// ============================================================
// EXERCISE PICKER (BOTTOM SHEET)
// ============================================================
let _pickerCtx = null;
let _pickerQuery = '';

function openPicker(type, sIdx, eIdx) {
  _pickerCtx = { type, sIdx, eIdx };
  _pickerQuery = '';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-search').value = '';
  renderSheetList('');
  setTimeout(()=>document.getElementById('sheet-search')?.focus(), 350);
}

function closePicker() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  _pickerCtx = null;
}

function filterSheet(q) {
  _pickerQuery = q;
  renderSheetList(q);
}

function renderSheetList(q) {
  const ctx = _pickerCtx;
  if (!ctx) return;

  const w = S.workout;
  let exercises = [];

  if (ctx.type === 'warmup') {
    exercises = S.libraries.warmup || [];
  } else {
    const libKey = WORKOUT_TYPES.find(t=>t.id===w?.type)?.lib;
    const primary = libKey ? (S.libraries[libKey]||[]) : [];
    const others = [];
    Object.keys(S.libraries).forEach(k=>{
      if (k!==libKey && k!=='warmup' && k!=='finisher') {
        (S.libraries[k]||[]).forEach(e=>{ if(!primary.includes(e)) others.push(e); });
      }
    });
    exercises = [...primary, ...others];
  }

  const qLow = q.toLowerCase();
  const filtered = q ? exercises.filter(e=>e.toLowerCase().includes(qLow)) : exercises;
  const libKey = WORKOUT_TYPES.find(t=>t.id===w?.type)?.lib;
  const primary = libKey ? (S.libraries[libKey]||[]) : [];

  let html = '';
  if (!q) html += `<div class="sheet-item custom-item" onclick="pickCustom()"><span style="font-size:16px">✏️</span> Custom exercise…</div>`;

  if (!q && ctx.type !== 'warmup' && primary.length) {
    const catLabel = WORKOUT_TYPES.find(t=>t.lib===libKey)?.label || '';
    html += `<div class="sheet-section-label">${catLabel}</div>`;
    primary.forEach(e => { html += `<div class="sheet-item" onclick="selectExercise(${esc(JSON.stringify(e))})">${esc(e)}</div>`; });
    const others = filtered.filter(e=>!primary.includes(e));
    if (others.length) {
      html += `<div class="sheet-section-label">All Exercises</div>`;
      others.forEach(e => { html += `<div class="sheet-item" onclick="selectExercise(${esc(JSON.stringify(e))})">${esc(e)}</div>`; });
    }
  } else {
    if (filtered.length === 0) html += `<div style="padding:24px;text-align:center;color:var(--text-faint)">No matches — try a different name or use Custom</div>`;
    filtered.forEach(e => { html += `<div class="sheet-item" onclick="selectExercise(${esc(JSON.stringify(e))})">${esc(e)}</div>`; });
    if (q) html += `<div class="sheet-item custom-item" style="margin-top:8px" onclick="pickCustom()">✏️ Use "${esc(q)}" as custom</div>`;
  }

  document.getElementById('sheet-list').innerHTML = html;
}

function selectExercise(name) {
  const ctx = _pickerCtx;
  if (!ctx) return;
  closePicker();
  if (ctx.type === 'warmup') {
    if (!S.workout.warmupItems.find(x=>x.name===name))
      S.workout.warmupItems.push({ name, setsReps:'' });
    render();
  } else {
    S.workout.sections[ctx.sIdx].exercises[ctx.eIdx].name = name;
    rerenderSection(ctx.sIdx);
  }
}

function pickCustom() {
  const q = _pickerQuery.trim();
  const ctx = _pickerCtx;
  closePicker();
  if (!ctx) return;
  if (ctx.type === 'warmup') {
    const name = q || prompt('Exercise name:');
    if (name) { S.workout.warmupItems.push({ name, setsReps:'' }); render(); }
  } else {
    const name = q || prompt('Exercise name:');
    if (name) { S.workout.sections[ctx.sIdx].exercises[ctx.eIdx].name = name; rerenderSection(ctx.sIdx); }
  }
}

// ============================================================
// ACTIONS
// ============================================================
function setWorkoutType(type) {
  if (!S.workout || S.workout.type !== type) {
    const today = todayKey();
    const existing = S.savedWorkouts[today];
    // Only restore if the saved workout was saved for today AND matches the requested type
    if (existing && existing.date === today && existing.type === type) {
      S.workout = JSON.parse(JSON.stringify(existing));
    } else {
      S.workout = buildDefaultTemplate(type);
    }
  }
  S.showTypeChooser = false;
  render();
}

function copyLastWorkout() {
  const lastSession = getLastSession(S.workout?.type);
  if (!lastSession) return;
  S.workout = JSON.parse(JSON.stringify(lastSession.workout));
  S.workout.date = todayKey();
  render();
}

function setGlobalRest(val) {
  (S.workout.sections || []).forEach(sec => { sec.rest = val; });
  const list = document.getElementById('sections-list');
  if (list) list.innerHTML = (S.workout.sections||[]).map((sec,i)=>renderSection(sec,i)).join('');
  // Re-render the global rest chip row to show new selection
  render();
}

function addSection() {
  const w = S.workout;
  w.sections.push({ letter: SECTION_LETTERS[w.sections.length]||'X', sectionType:null, exercises:[], rest:'', coachNote:'', _collapsed:false });
  render();
  setTimeout(()=>{
    const el = document.getElementById(`sec-${w.sections.length-1}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 80);
}

function deleteSection(idx) {
  S.workout.sections.splice(idx,1);
  S.workout.sections.forEach((s,i)=>s.letter=SECTION_LETTERS[i]);
  render();
}

function moveSection(idx, dir) {
  const secs = S.workout.sections;
  const t = idx+dir;
  if (t<0||t>=secs.length) return;
  [secs[idx],secs[t]]=[secs[t],secs[idx]];
  secs.forEach((s,i)=>s.letter=SECTION_LETTERS[i]);
  render();
}

function setSectionType(idx, type) {
  const sec = S.workout.sections[idx];
  sec.sectionType = type;
  const count = type==='single'?1:type==='superset'?2:3;
  while (sec.exercises.length < count) sec.exercises.push({name:'',setsReps:'',youtubeUrl:'',coachNote:''});
  while (sec.exercises.length > count) sec.exercises.pop();
  rerenderSection(idx);
}

function rerenderSection(idx) {
  const list = document.getElementById('sections-list');
  if (list) {
    list.innerHTML = (S.workout.sections || []).map((sec, i) => renderSection(sec, i)).join('');
  } else {
    render();
  }
}

function pickReps(sIdx, eIdx, val) {
  S.workout.sections[sIdx].exercises[eIdx].setsReps = val === '__custom__' ? '' : val;
  rerenderSection(sIdx);
}

function toggleExField(sIdx, eIdx, field) {
  S.workout.sections[sIdx].exercises[eIdx][field] = !S.workout.sections[sIdx].exercises[eIdx][field];
  rerenderSection(sIdx);
}

function removeWarmupItem(i) {
  S.workout.warmupItems.splice(i,1);
  render();
}

function saveWorkout() {
  const w = S.workout;
  S.savedWorkouts[w.date] = JSON.parse(JSON.stringify(w));
  saveWorkouts();
  db.collection('workouts').doc(w.date).set(S.savedWorkouts[w.date])
    .catch(e => { showFbStatus('⚠ Save failed: ' + e.message, true); console.error(e); });
  const btn = document.getElementById('save-btn');
  if (btn) {
    btn.innerHTML = '✓ Saved!';
    btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
    setTimeout(()=>{ btn.innerHTML = '<span>💾</span> Save Workout'; btn.style.background=''; }, 2200);
  }
}

// Library actions
function addLibEx() {
  const name = document.getElementById('lib-name').value.trim();
  const cat = document.getElementById('lib-cat').value;
  if (!name) return;
  if (!S.libraries[cat]) S.libraries[cat]=[];
  S.libraries[cat].push(name);

function delLibEx(cat,i) { S.libraries[cat].splice(i,1); saveLibraries(); render(); }
function editLibEx(cat,i) {
  const nameEl = document.getElementById(`libname-${cat}-${i}`);
  const row = document.getElementById(`librow-${cat}-${i}`);
  nameEl.innerHTML = `<input type="text" class="input" style="padding:5px 8px;font-size:12px" value="${esc(S.libraries[cat][i])}" id="libedit-${cat}-${i}">`;

  row.querySelector('button').onclick = ()=>{
    const v = document.getElementById(`libedit-${cat}-${i}`).value.trim();

  };
}

// ============================================================
// TIMER
// ============================================================
function startSectionTimer(idx) {
  const t = S.timer;
  // Tap on same running timer → pause
  if (t.sIdx === idx && t.running) {
    clearInterval(t._iv);
    t.running = false; t._iv = null;
    tickSectionTimer();
    return;
  }
  // Cancel any other running timer
  clearInterval(t._iv);
  const sec = (getTodayWorkout()||S.workout)?.sections?.[idx];
  const seconds = parseRestSeconds(sec?.rest);
  // Resume same section if paused mid-way, otherwise restart
  const remaining = (t.sIdx === idx && t.remaining > 0 && t.remaining < seconds) ? t.remaining : seconds;
  S.timer = { sIdx: idx, running: true, total: seconds, remaining, _iv: null };
  S.timer._iv = setInterval(() => {
    S.timer.remaining--;
    if (S.timer.remaining <= 0) {
      clearInterval(S.timer._iv); S.timer.running = false; S.timer._iv = null;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    tickSectionTimer();
  }, 1000);
  tickSectionTimer();
}

function tickSectionTimer() {
  const t = S.timer;
  const idx = t.sIdx;
  if (idx == null || idx < 0) return;
  const numEl = document.getElementById(`sec-timer-num-${idx}`);
  if (!numEl) return;
  const btnEl = document.getElementById(`sec-timer-btn-${idx}`);
  const statusEl = document.getElementById(`sec-timer-status-${idx}`);
  const m = Math.floor(t.remaining / 60), s = t.remaining % 60;
  numEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  numEl.style.color = (t.remaining < 10 && t.remaining > 0) ? '#f87171' : 'white';
  if (btnEl) {
    const isDone = !t.running && t.remaining <= 0;
    btnEl.textContent = isDone ? 'Done ✓' : (t.running ? 'Pause' : (t.remaining < t.total ? 'Resume' : 'Start'));
    btnEl.style.background = isDone ? 'rgba(34,197,94,0.15)' : 'rgba(99,77,179,0.5)';
    btnEl.style.color = isDone ? '#4ade80' : 'white';
  }
  if (statusEl) {
    const isDone = !t.running && t.remaining <= 0;
    statusEl.textContent = isDone ? 'Rest done! ✓' : (t.running ? 'resting…' : 'rest');
    statusEl.style.color = isDone ? '#4ade80' : '#9988de';
  }
}

function tickTimer() {} // kept for legacy call-sites, no-op

// VIDEO BUILDER

const VIDEO_CATS = [

  { key:'chest_biceps', label:'Chest & Biceps' },

          ${url

            : `<button onclick="startVideoEdit(${safeJson})"

    requestAnimationFrame(() => {

      if (inp) { inp.focus(); inp.select(); }

}

function startVideoEdit(name) {
  S.videoEdit = name;
  render();
}

function saveVideoUrl() {
  const name = S.videoEdit;
  if (!name) return;
  const inp = document.getElementById('video-edit-input');
  const url = inp ? inp.value.trim() : '';
  if (url) { S.videoLibrary[name] = url; } else { delete S.videoLibrary[name]; }
  saveVideoLibrary();
  S.videoEdit = null;
  render();
}

// CLIENT HELPERS
// ============================================================
function getCompletionState(date,idx){ try{return !!(JSON.parse(localStorage.getItem(`kodus_complete_${date}`)||'{}')[idx]);}catch(e){return false;}}
function toggleDone(date,idx,val){
  try{
    const k=`kodus_complete_${date}`;
    const d=JSON.parse(localStorage.getItem(k)||'{}');
    d[idx]=val;
    localStorage.setItem(k,JSON.stringify(d));
    db.collection('settings').doc('preferences').set(
      { completions: { [date]: d } }, { merge: true }
    ).catch(e => console.error('toggleDone fb', e));
    // Auto-mark workout done if all sections complete
    const w = S.savedWorkouts[date];
    if (w && val) {
      const allDone = (w.sections||[]).every((_,i)=>i===idx?val:!!(d[i]));
      if (allDone) markWorkoutDone(date, true);
    }
  }catch(e){}
  render();
}
function toggleVid(btn){ const w=btn.nextElementSibling; const h=w.style.display==='none'; w.style.display=h?'block':'none'; btn.textContent=h?'▼ Hide Demo':'▶ Watch Demo'; }

function ytEmbed(url) {
  if (!url) return '';
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/) || url.match(/embed\/([^?]+)/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : url;
}

function fmtDate(d) { return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
