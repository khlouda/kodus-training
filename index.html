<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kodus Training</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --brand: #634DB3;
  --brand-light: #7761d0;
  --brand-dim: rgba(99,77,179,0.25);
  --surface: rgba(255,255,255,0.045);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.09);
  --border-strong: rgba(255,255,255,0.15);
  --text: #e8e6f0;
  --text-dim: rgba(255,255,255,0.45);
  --text-faint: rgba(255,255,255,0.25);
  --bg: #0f0e17;
  --bg-elevated: #17162a;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- Noise texture ---- */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ---- Typography ---- */
.t-display { font-family: Georgia, serif; letter-spacing: -0.025em; }
.t-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }

/* ---- Buttons ---- */
.btn-primary {
  background: linear-gradient(135deg, #7761d0 0%, #634DB3 60%, #5241a0 100%);
  box-shadow: 0 4px 20px rgba(99,77,179,0.45), inset 0 1px 0 rgba(255,255,255,0.12);
  color: white; border: none; cursor: pointer;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,77,179,0.6), inset 0 1px 0 rgba(255,255,255,0.12); }
.btn-primary:active { transform: scale(0.97); }

.btn-ghost {
  background: var(--surface); border: 1px solid var(--border);
  color: #c4bde8; cursor: pointer;
  transition: background 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-ghost:hover { background: var(--surface-hover); }
.btn-ghost:active { transform: scale(0.97); }

/* ---- Cards ---- */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
.card-elevated { background: rgba(255,255,255,0.065); border: 1px solid var(--border-strong); border-radius: 16px; padding: 18px; }

/* ---- Inputs ---- */
.input {
  background: rgba(255,255,255,0.055);
  border: 1.5px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 11px 14px;
  width: 100%;
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input:focus { border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(99,77,179,0.18); }
.input::placeholder { color: var(--text-faint); }
textarea.input { resize: none; line-height: 1.55; }

/* ---- Chips ---- */
.chips-row { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  display: inline-flex; align-items: center; white-space: nowrap;
  padding: 7px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: #c4bde8; cursor: pointer;
  transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink: 0;
}
.chip:hover { border-color: rgba(99,77,179,0.5); background: var(--brand-dim); }
.chip:active { transform: scale(0.94); }
.chip.selected {
  background: rgba(99,77,179,0.3);
  border-color: var(--brand-light);
  color: white;
  box-shadow: 0 0 0 2px rgba(99,77,179,0.2);
}

/* ---- Workout type buttons ---- */
.type-btn {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 16px; padding: 18px 10px;
  text-align: center; cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  color: #c4bde8;
}
.type-btn:hover { border-color: rgba(99,77,179,0.4); background: rgba(99,77,179,0.1); }
.type-btn.active {
  background: rgba(99,77,179,0.22);
  border-color: var(--brand-light);
  color: white;
  box-shadow: 0 0 0 3px rgba(99,77,179,0.15), 0 4px 20px rgba(99,77,179,0.25);
}

/* ---- Section card ---- */
.section-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px; overflow: hidden; }
.section-card-head {
  background: linear-gradient(135deg, rgba(99,77,179,0.2), rgba(82,65,160,0.12));
  border-bottom: 1px solid rgba(99,77,179,0.18);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}

/* ---- Exercise pick button ---- */
.ex-pick-btn {
  width: 100%; padding: 14px 16px; border-radius: 13px;
  background: rgba(255,255,255,0.04); border: 1.5px dashed rgba(255,255,255,0.15);
  color: var(--text-dim); font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  transition: all 0.2s;
}
.ex-pick-btn.filled {
  background: rgba(99,77,179,0.12); border-style: solid;
  border-color: rgba(99,77,179,0.35); color: white; font-weight: 600;
}
.ex-pick-btn:hover { background: rgba(99,77,179,0.15); border-color: rgba(99,77,179,0.45); }

/* ---- Section type buttons (big) ---- */
.stype-btn {
  flex: 1; padding: 16px 8px; border-radius: 14px;
  border: 2px solid var(--border); background: var(--surface);
  text-align: center; cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.stype-btn:hover { border-color: rgba(99,77,179,0.45); background: rgba(99,77,179,0.1); }
.stype-btn.active { background: rgba(99,77,179,0.22); border-color: var(--brand-light); box-shadow: 0 0 0 3px rgba(99,77,179,0.15); }

/* ---- Bottom sheet ---- */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  z-index: 300; opacity: 0; pointer-events: none;
  backdrop-filter: blur(4px);
  transition: opacity 0.28s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1c1a2e; border-radius: 24px 24px 0 0;
  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  max-height: 82vh; display: flex; flex-direction: column;
  box-shadow: 0 -12px 60px rgba(0,0,0,0.6);
}
.sheet.open { transform: translateY(0); }

.sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 14px auto 0; flex-shrink: 0; }
.sheet-search-wrap { padding: 14px 16px 10px; flex-shrink: 0; }
.sheet-list { overflow-y: auto; flex: 1; padding: 0 16px 40px; }
.sheet-item {
  padding: 13px 14px; border-radius: 12px; cursor: pointer;
  font-size: 15px; color: #c4bde8; display: flex; align-items: center; gap: 10px;
  transition: background 0.12s;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.sheet-item:hover, .sheet-item:active { background: rgba(99,77,179,0.2); color: white; }
.sheet-item.custom-item { color: #9988de; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 4px; }
.sheet-section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-faint); padding: 12px 14px 6px; }

/* ---- Toggle ---- */
.tog { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
.tog input { opacity: 0; width: 0; height: 0; position: absolute; }
.tog-sl { position: absolute; cursor: pointer; inset: 0; background: rgba(255,255,255,0.1); border-radius: 26px; border: 1px solid var(--border); transition: 0.25s; }
.tog-sl:before { content: ''; position: absolute; height: 20px; width: 20px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
input:checked + .tog-sl { background: var(--brand); border-color: var(--brand); }
input:checked + .tog-sl:before { transform: translateX(20px); }

/* ---- Client view ---- */
.cv-card { background: rgba(255,255,255,0.048); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; box-shadow: 0 6px 28px rgba(0,0,0,0.28); }
.cv-head { background: linear-gradient(135deg, rgba(99,77,179,0.38), rgba(82,65,160,0.22)); border-bottom: 1px solid rgba(99,77,179,0.22); padding: 15px 18px; }
.reps-badge { display: inline-flex; align-items: center; background: rgba(99,77,179,0.22); border: 1px solid rgba(99,77,179,0.38); border-radius: 9px; padding: 5px 12px; font-weight: 700; color: #c4bde8; font-size: 15px; }
.complete-chk { width: 24px; height: 24px; border-radius: 7px; border: 2px solid rgba(255,255,255,0.2); background: transparent; cursor: pointer; appearance: none; -webkit-appearance: none; flex-shrink: 0; transition: all 0.2s; }
.complete-chk:checked { background: var(--brand); border-color: var(--brand); background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 12 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='1,5 4,9 11,1' stroke='white' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: center; background-size: 12px; }

/* ---- Nav ---- */
.nav-tab { padding: 9px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-dim); border: 1px solid transparent; }
.nav-tab.active { background: rgba(99,77,179,0.22); color: white; border-color: rgba(99,77,179,0.35); }
.nav-tab:hover:not(.active) { color: var(--text); background: var(--surface-hover); }

/* ---- Streak ---- */
.streak-dot { width: 33px; height: 33px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
.sd-done { background: var(--brand); color: white; box-shadow: 0 0 14px rgba(99,77,179,0.5); }
.sd-today { border: 2px solid var(--brand); color: #9988de; }
.sd-empty { background: rgba(255,255,255,0.055); color: var(--text-faint); }

/* ---- Timer ---- */
.timer-num { font-family: Georgia, serif; font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }

/* ---- Collapse expand ---- */
.expand-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: rgba(99,77,179,0.9); cursor: pointer; padding: 4px 0; border: none; background: none; }
.expand-link:hover { color: var(--brand-light); }

/* ---- Add button ---- */
.add-section-btn {
  width: 100%; padding: 15px; border-radius: 15px;
  border: 2px dashed rgba(99,77,179,0.35); background: rgba(99,77,179,0.06);
  color: #9988de; font-size: 15px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s;
}
.add-section-btn:hover { background: rgba(99,77,179,0.12); border-color: rgba(99,77,179,0.55); color: white; }
.add-section-btn:active { transform: scale(0.98); }

/* ---- Warmup item ---- */
.warmup-item-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; }

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(99,77,179,0.35); border-radius: 3px; }

/* ---- Animations ---- */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp 0.25s ease; }

/* ---- Print ---- */
@media print {
  body { background: white !important; color: black !important; }
  .no-print { display: none !important; }
  .cv-card { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; }
  .cv-head { background: #f5f3ff !important; }
  .reps-badge { background: #f5f3ff !important; color: #634DB3 !important; }
}
</style>
</head>
<body>

<!-- Bottom sheet (exercise picker) -->
<div id="sheet-overlay" class="sheet-overlay" onclick="closePicker()"></div>
<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-search-wrap">
    <input type="search" id="sheet-search" class="input" placeholder="Search exercises…" oninput="filterSheet(this.value)" autocomplete="off" autocorrect="off">
  </div>
  <div id="sheet-list" class="sheet-list"></div>
</div>

<div id="app"></div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const LIBRARIES = {
  shoulders:    ['Dumbbell shoulder press neutral grip','Dumbbell shoulder press','Ez bar supinated shoulder press','Barbell front raises supinated','Front raises barbell wide grip','Front raises DBs alternating','Barbell upright row','Seated dumbbell lateral raises','Cable lateral raises','Dumbbell rear delt fly','Face pulls cable','Dumbbell shrugs','Arnold press','Behind the neck press','Scapula push ups','Shoulder taps','Band pull aparts','Plank walk outs'],
  back_triceps: ['Pull ups','Barbell bent over row','Chest supported dumbbell row incline bench','Seated row cable','Single arm dumbbell row','High row cable','Straight arm cable pulldown','Lat pulldown','Back extension','Dumbbell skull crusher','Dumbbell skull crusher neutral grip','Tricep pushdown rope','Tricep pushdown cable','Overhead tricep extension cable','Diamond push ups','Close grip bench press'],
  chest_biceps: ['Incline smith bench press','Incline dumbbell press','Dumbbell chest press flat','Decline chest press machine','Incline chest fly','Butterfly machine fly','Standing cable crossover','Cable cross high to low','Cable cross low to high','Dumbbell chest pullover','Push ups','Dips','Dumbbell bicep curls','Barbell curl','Hammer curl DBs','Rope hammer curls','Single arm preacher curl','Incline dumbbell curl','Band pull aparts','Shoulder taps','Plank walk outs','Worlds greatest stretch'],
  legs:         ['Hack squat','Back squat','Heels elevated goblet squat','Bulgarian split squat','Walking lunges','RDL single leg dumbbell','Romanian deadlift','Prone leg curl','Seated leg extension','Hip thrust machine','Leg press','Standing calf raise','Seated calf raise','Box jumps','Forward/back single leg swings','Cross body single leg swings','World\'s greatest stretch','Bird dog'],
  warmup:       ['Row (time or calories)','Air Bike (time or calories)','Run (distance or time)','Scapula push ups','Shoulder taps','Band pull aparts','Plank walk outs','World\'s greatest stretch','Bird dog','Single leg swings forward/back','Single leg swings cross body'],
  finisher:     ['Ski erg (calories)','Burpees','Run 200m','Row (calories)','Air Bike (calories)','Box jumps','Dips','Pull ups'],
};

const WORKOUT_TYPES = [
  { id:'shoulders',    label:'Shoulders',      icon:'🏋️', lib:'shoulders' },
  { id:'back_triceps', label:'Back & Triceps',  icon:'💪', lib:'back_triceps' },
  { id:'chest_biceps', label:'Chest & Biceps',  icon:'🫁', lib:'chest_biceps' },
  { id:'legs',         label:'Leg Day',         icon:'🦵', lib:'legs' },
  { id:'rest',         label:'Rest Day',        icon:'😴', lib:null },
];

const SECTION_LETTERS = 'ABCDEFGHIJKLMNOP'.split('');

const REPS_PRESETS = ['2×10','3×8','3×10','3×12','3×15','4×6','4×8','4×10','4×12','5×5'];
const REST_PRESETS = ['—','30s','45s','60s','90s','2min','3min'];

// ============================================================
// STATE
// ============================================================
let S = {
  view: 'client',        // 'client' | 'coach' | 'login'
  coachTab: 'builder',   // 'builder' | 'library'
  workout: null,
  savedWorkouts: {},
  libraries: {},
  timer: { running: false, total: 0, remaining: 0, _iv: null },
  // picker state
  pickerCtx: null,       // { type: 'exercise'|'warmup', sIdx, eIdx }
};

// ============================================================
// PERSIST
// ============================================================
function loadState() {
  try { S.savedWorkouts = JSON.parse(localStorage.getItem('kodus_workouts') || '{}'); } catch(e){}
  try {
    const l = localStorage.getItem('kodus_libraries');
    S.libraries = l ? JSON.parse(l) : JSON.parse(JSON.stringify(LIBRARIES));
  } catch(e) { S.libraries = JSON.parse(JSON.stringify(LIBRARIES)); }
  if (!S.libraries.warmup) S.libraries.warmup = [...LIBRARIES.warmup];
  saveLibraries();
}
function saveWorkouts()  { localStorage.setItem('kodus_workouts',  JSON.stringify(S.savedWorkouts)); }
function saveLibraries() { localStorage.setItem('kodus_libraries', JSON.stringify(S.libraries)); }

function todayKey() { return new Date().toISOString().slice(0,10); }
function getTodayWorkout() { return S.savedWorkouts[todayKey()] || null; }

function getWeekDays() {
  const today = new Date();
  const dayLabels = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  return Array.from({length:7},(_,i)=>{
    const d = new Date(today); d.setDate(today.getDate()-(6-i));
    const key = d.toISOString().slice(0,10);
    return { key, label:dayLabels[d.getDay()], isToday:i===6, has:!!S.savedWorkouts[key] };
  });
}

function emptyWorkout(type) {
  return { type, warmupItems:[], warmupNote:'', sections:[], finisherEnabled:false, finisherRounds:'', finisherExercises:'', finisherItems:[], coachNote:'', date:todayKey() };
}
function emptySection(letter) {
  return { letter, sectionType:null, exercises:[], rest:'', coachNote:'', _collapsed:false };
}
function emptyEx() {
  return { name:'', setsReps:'', youtubeUrl:'', _showNote:false, _showVideo:false };
}

// ============================================================
// ROUTER
// ============================================================
const app = document.getElementById('app');
function render() {
  if (S.view === 'login') { renderLogin(); return; }
  if (S.view === 'coach') { renderCoach(); return; }
  renderClient();
}

// ============================================================
// LOGIN
// ============================================================
function renderLogin() {
  app.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="width:100%;max-width:340px" class="fade-up">
      <div style="text-align:center;margin-bottom:28px">
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#7761d0,#5241a0);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 32px rgba(99,77,179,0.5);font-size:28px">🏋️</div>
        <h1 class="t-display" style="font-size:22px;font-weight:700;color:white;margin-bottom:4px">Coach Portal</h1>
        <p style="color:var(--text-dim);font-size:13px">Enter password to continue</p>
      </div>
      <div class="card-elevated">
        <div style="margin-bottom:14px">
          <div class="t-label" style="margin-bottom:7px">Password</div>
          <input id="pw" type="password" class="input" placeholder="Enter password" autocomplete="off">
        </div>
        <div id="pw-err" style="display:none;color:#f87171;font-size:13px;margin-bottom:10px">Incorrect password</div>
        <button onclick="attemptLogin()" class="btn-primary" style="width:100%;padding:14px;border-radius:13px;font-size:15px;font-weight:700">Enter Coach View</button>
        <button onclick="S.view='client';render()" class="btn-ghost" style="width:100%;padding:13px;border-radius:13px;font-size:14px;font-weight:500;margin-top:10px">Back to My Workouts</button>
      </div>
    </div>
  </div>`;
  document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') attemptLogin(); });
  setTimeout(()=>document.getElementById('pw')?.focus(),100);
}

function attemptLogin() {
  if (document.getElementById('pw').value === 'mostafa') {
    S.view = 'coach';
    if (!S.workout) {
      const existing = getTodayWorkout();
      S.workout = existing ? JSON.parse(JSON.stringify(existing)) : emptyWorkout(null);
    }
    render();
  } else {
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw').style.borderColor='#f87171';
  }
}

// ============================================================
// CLIENT VIEW
// ============================================================
function renderClient() {
  const workout = getTodayWorkout();
  const days = getWeekDays();
  app.innerHTML = `
  <div style="min-height:100vh">
    <!-- Header -->
    <div class="no-print" style="background:rgba(15,14,23,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50">
      <div>
        <div class="t-display" style="font-size:19px;font-weight:700;color:white;letter-spacing:-0.02em">Kodus Training</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:1px">${fmtDate(new Date())}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="window.print()" class="btn-ghost no-print" style="padding:8px 12px;border-radius:10px;font-size:12px;font-weight:600">Print</button>
        <button onclick="S.view='login';render()" class="no-print" style="width:36px;height:36px;border-radius:10px;background:rgba(99,77,179,0.18);border:1px solid rgba(99,77,179,0.3);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer">🔐</button>
      </div>
    </div>
    <div style="max-width:480px;margin:0 auto;padding:18px 14px 100px">

      <!-- Streak -->
      <div class="card no-print" style="margin-bottom:14px">
        <div class="t-label" style="margin-bottom:10px">Weekly Streak</div>
        <div style="display:flex;gap:6px;justify-content:space-between">
          ${days.map(d=>`
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
            <div class="streak-dot ${d.has?'sd-done':d.isToday?'sd-today':'sd-empty'}">${d.has?'✓':d.label.charAt(0)}</div>
            <span style="font-size:10px;color:var(--text-faint)">${d.label}</span>
          </div>`).join('')}
        </div>
      </div>

      ${workout ? renderClientWorkout(workout) : `
      <div class="card" style="text-align:center;padding:48px 20px">
        <div style="font-size:44px;margin-bottom:14px">🌙</div>
        <div style="font-size:20px;font-weight:700;color:white;margin-bottom:8px">No Workout Today</div>
        <p style="color:var(--text-dim);font-size:14px;line-height:1.6">Mostafa hasn't posted today's session yet. Check back soon!</p>
      </div>`}

      <!-- Rest Timer -->
      <div class="card no-print" style="margin-top:16px;text-align:center" id="rest-timer-card">
        <div class="t-label" style="margin-bottom:14px">Rest Timer</div>
        <div style="position:relative;display:inline-block;width:120px;height:120px;margin-bottom:14px">
          <svg width="120" height="120" style="transform:rotate(-90deg)" id="timer-svg">
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#634DB3" stroke-width="7" stroke-linecap="round"
              stroke-dasharray="${2*Math.PI*50}" stroke-dashoffset="${2*Math.PI*50}" id="timer-ring"/>
          </svg>
          <div id="timer-num" class="timer-num" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">0:00</div>
        </div>
        <div style="display:flex;gap:7px;justify-content:center;margin-bottom:12px">
          <button onclick="setTimer(60)"  class="btn-ghost" style="padding:8px 13px;border-radius:10px;font-size:13px;font-weight:600">60s</button>
          <button onclick="setTimer(90)"  class="btn-ghost" style="padding:8px 13px;border-radius:10px;font-size:13px;font-weight:600">90s</button>
          <button onclick="setTimer(120)" class="btn-ghost" style="padding:8px 13px;border-radius:10px;font-size:13px;font-weight:600">2min</button>
        </div>
        <button onclick="toggleTimer()" id="timer-btn" class="btn-primary" style="padding:10px 26px;border-radius:12px;font-size:14px;font-weight:700">Start</button>
        <button onclick="resetTimer()" class="btn-ghost" style="padding:10px 14px;border-radius:12px;font-size:13px;margin-left:8px">Reset</button>
      </div>
    </div>
  </div>`;
  tickTimer();
}

function renderClientWorkout(w) {
  const ti = WORKOUT_TYPES.find(t=>t.id===w.type)||{label:w.type,icon:'💪'};
  let h = '';
  h += `<div style="background:linear-gradient(135deg,rgba(99,77,179,0.28),rgba(82,65,160,0.18));border:1px solid rgba(99,77,179,0.28);border-radius:18px;padding:18px;margin-bottom:16px;display:flex;align-items:center;gap:14px">
    <div style="font-size:34px">${ti.icon}</div>
    <div>
      <div class="t-label" style="margin-bottom:2px">Today's Session</div>
      <div class="t-display" style="font-size:22px;font-weight:700;color:white">${ti.label}</div>
    </div>
  </div>`;

  if (w.coachNote) h += `<div style="background:linear-gradient(135deg,rgba(99,77,179,0.18),rgba(82,65,160,0.12));border:1px solid rgba(99,77,179,0.3);border-radius:14px;padding:14px 16px;margin-bottom:16px">
    <div class="t-label" style="margin-bottom:6px">📝 Coach's Note</div>
    <p style="color:#c4bde8;font-size:15px;line-height:1.65;font-style:italic">"${esc(w.coachNote)}"</p>
  </div>`;

  if (w.warmupItems?.length || w.warmupNote) {
    h += `<div class="cv-card" style="margin-bottom:14px">
      <div class="cv-head" style="display:flex;align-items:center;gap:10px"><span style="font-size:18px">🔥</span><span style="font-weight:700;font-size:16px;color:white">Warm Up</span></div>
      <div style="padding:14px">
        ${w.warmupNote ? `<p style="color:#c4bde8;font-size:14px;font-style:italic;line-height:1.6;margin-bottom:${w.warmupItems?.length?'12px':'0'}">${esc(w.warmupNote)}</p>` : ''}
        ${(w.warmupItems||[]).map(x=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="font-size:14px;font-weight:500;color:white">${esc(x.name)}</span>
          <span style="font-size:13px;color:#9988de;font-weight:600">${esc(x.setsReps)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  (w.sections||[]).forEach((sec,idx)=>{
    const done = getCompletionState(w.date, idx);
    const lbl = sec.sectionType==='single' ? sec.letter : (sec.exercises||[]).map((_,i)=>sec.letter+(i+1)).join('·');
    h += `<div class="cv-card fade-up" style="margin-bottom:14px;${done?'opacity:0.55':''}">
      <div class="cv-head" style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:12px">
          <span class="t-display" style="font-size:26px;font-weight:700;color:#9988de">${lbl}</span>
          <div>
            <div class="t-label">${sec.sectionType==='superset'?'Superset':sec.sectionType==='triset'?'Triset':'Exercise'}</div>
            ${sec.rest && sec.rest!=='—' ? `<div style="font-size:12px;color:#9988de;margin-top:1px">⏱ Rest ${esc(sec.rest)}</div>` : ''}
          </div>
        </div>
        <input type="checkbox" class="complete-chk" ${done?'checked':''} onchange="toggleDone('${w.date}',${idx},this.checked)">
      </div>
      <div style="padding:14px">
        ${(sec.exercises||[]).map((ex,ei)=>`
        <div style="${ei>0?'border-top:1px solid rgba(255,255,255,0.06);padding-top:13px;margin-top:13px':''}">
          ${sec.sectionType!=='single'?`<div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9988de;margin-bottom:4px">${sec.letter}${ei+1}</div>`:''}
          <div style="font-size:18px;font-weight:700;color:white;line-height:1.3;margin-bottom:7px">${esc(ex.name)||'—'}</div>
          ${ex.setsReps?`<div class="reps-badge" style="margin-bottom:8px">${esc(ex.setsReps)}</div>`:''}
          ${ex.youtubeUrl?`<div style="margin-top:10px">
            <button onclick="toggleVid(this)" class="btn-ghost" style="padding:7px 14px;border-radius:9px;font-size:12px;font-weight:600;width:100%;display:flex;align-items:center;justify-content:center;gap:6px">▶ Watch Demo</button>
            <div class="vid-wrap" style="display:none;margin-top:8px;border-radius:12px;overflow:hidden"><iframe width="100%" height="195" src="${ytEmbed(ex.youtubeUrl)}" frameborder="0" allowfullscreen></iframe></div>
          </div>`:''}
        </div>`).join('')}
        ${sec.coachNote?`<div style="margin-top:11px;padding:10px 12px;background:rgba(99,77,179,0.1);border-radius:9px;border-left:3px solid #634DB3;font-size:13px;color:#c4bde8;font-style:italic">${esc(sec.coachNote)}</div>`:''}
      </div>
    </div>`;
  });

  if (w.finisherEnabled && (w.finisherExercises||w.finisherItems?.length)) {
    h += `<div class="cv-card" style="margin-bottom:14px">
      <div class="cv-head" style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">⚡</span>
        <div><div style="font-weight:700;font-size:16px;color:white">Finisher</div>${w.finisherRounds?`<div style="font-size:12px;color:#9988de">${esc(w.finisherRounds)}</div>`:''}</div>
      </div>
      <div style="padding:14px">
        ${w.finisherExercises?`<p style="color:#c4bde8;font-size:14px;line-height:1.65">${esc(w.finisherExercises)}</p>`:''}
        ${(w.finisherItems||[]).map(f=>`<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:15px;color:white">${esc(f.name)}</div>`).join('')}
      </div>
    </div>`;
  }
  return h;
}

function renderCoach() {
  if (!S.workout) S.workout = emptyWorkout(null);
  app.innerHTML = `
  <div style="min-height:100vh">
    <div style="background:rgba(15,14,23,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50">
      <div>
        <div class="t-display" style="font-size:19px;font-weight:700;color:white">Coach Portal</div>
        <div style="font-size:11px;color:var(--text-dim)">Mostafa Kodus</div>
      </div>
      <button onclick="S.view='client';render()" class="btn-ghost" style="padding:8px 12px;border-radius:10px;font-size:13px;font-weight:600">← Client View</button>
    </div>
    <div style="padding:10px 14px 12px;display:flex;gap:7px;border-bottom:1px solid rgba(255,255,255,0.05)">
      <button class="nav-tab ${S.coachTab==='builder'?'active':''}" onclick="S.coachTab='builder';render()">📋 Builder</button>
      <button class="nav-tab ${S.coachTab==='library'?'active':''}" onclick="S.coachTab='library';render()">📚 Library</button>

      ${S.coachTab==='builder' ? renderBuilder() : renderLibrary()}
    </div>
  </div>`;
}

// ============================================================
// BUILDER
// ============================================================
function renderBuilder() {
  const w = S.workout;
  let h = '';

  /* ── Step 1: Workout Type ── */
  h += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      ${stepBadge(1)} <span style="font-size:15px;font-weight:700;color:white">Workout Type</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${WORKOUT_TYPES.map(t=>`
      <button class="type-btn ${w.type===t.id?'active':''}" onclick="setWorkoutType('${t.id}')">
        <div style="font-size:24px;margin-bottom:5px">${t.icon}</div>
        <div style="font-size:13px;font-weight:700">${t.label}</div>
      </button>`).join('')}
    </div>
  </div>`;

  if (!w.type) return h;

  if (w.type === 'rest') {
    h += `<div class="card" style="text-align:center;padding:32px;margin-bottom:14px">
      <div style="font-size:44px;margin-bottom:12px">😴</div>
      <div style="font-size:18px;font-weight:700;color:white;margin-bottom:12px">Rest Day</div>
      <textarea class="input" rows="3" placeholder="Coach note (optional)…" oninput="w.coachNote=this.value" style="text-align:left">${esc(w.coachNote)}</textarea>
      <button onclick="saveWorkout()" class="btn-primary" style="margin-top:14px;width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700">Save Rest Day</button>
    </div>`;
    return h;
  }

  /* ── Step 2: Warmup ── */
  h += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      ${stepBadge(2)} <span style="font-size:15px;font-weight:700;color:white">🔥 Warm Up</span>
    </div>
    <div style="margin-bottom:12px">
      <div class="t-label" style="margin-bottom:7px">Quick note (optional)</div>
      <input type="text" class="input" placeholder="e.g. usual upper warm up" value="${esc(w.warmupNote)}" oninput="w.warmupNote=this.value">
    </div>
    <div class="t-label" style="margin-bottom:8px">Exercises</div>
    <div id="warmup-list" style="display:flex;flex-direction:column;gap:7px">
      ${(w.warmupItems||[]).map((item,i)=>`
      <div class="warmup-item-row">
        <div style="flex:1;font-size:14px;font-weight:500;color:white;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.name)}</div>
        <input type="text" value="${esc(item.setsReps)}" placeholder="Sets / Duration" oninput="w.warmupItems[${i}].setsReps=this.value"
          style="width:130px;padding:7px 10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;outline:none;flex-shrink:0">
        <button onclick="removeWarmupItem(${i})" style="width:28px;height:28px;border-radius:7px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:13px;cursor:pointer;flex-shrink:0">✕</button>
      </div>`).join('')}
    </div>
    <button onclick="openPicker('warmup')" class="btn-ghost" style="width:100%;margin-top:10px;padding:11px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px">
      <span style="font-size:16px;color:#634DB3">+</span> Add Warmup Exercise
    </button>
  </div>`;

  /* ── Step 3: Sections ── */
  h += `<div style="margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      ${stepBadge(3)} <span style="font-size:15px;font-weight:700;color:white">Sections</span>
    </div>
    <div id="sections-list">
      ${(w.sections||[]).map((sec,i)=>renderSection(sec,i)).join('')}
    </div>
    <button class="add-section-btn" onclick="addSection()" id="add-section-btn">
      <span style="font-size:20px">+</span>
      Add Section ${SECTION_LETTERS[(w.sections||[]).length]||''}
    </button>
  </div>`;

  /* ── Step 4: Finisher ── */
  h += `<div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">${stepBadge(4)} <span style="font-size:15px;font-weight:700;color:white">⚡ Finisher</span></div>
      <label class="tog"><input type="checkbox" ${w.finisherEnabled?'checked':''} onchange="w.finisherEnabled=this.checked;render()"><span class="tog-sl"></span></label>
    </div>
    ${w.finisherEnabled ? `
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
      <div>
        <div class="t-label" style="margin-bottom:7px">Rounds / Format</div>
        <input type="text" class="input" placeholder="e.g. 3 rounds, AMRAP 10 min" value="${esc(w.finisherRounds)}" oninput="w.finisherRounds=this.value">
      </div>
      <div>
        <div class="t-label" style="margin-bottom:7px">Exercises</div>
        <textarea class="input" rows="3" placeholder="e.g. 10 burpees, 10 box jumps" oninput="w.finisherExercises=this.value">${esc(w.finisherExercises)}</textarea>
      </div>
    </div>` : ''}
  </div>`;

  /* ── Step 5: Coach Note ── */
  h += `<div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">${stepBadge(5)} <span style="font-size:15px;font-weight:700;color:white">📝 Note to Khaled</span></div>
    <textarea class="input" rows="3" placeholder="e.g. Focus on form today, not weight." oninput="w.coachNote=this.value">${esc(w.coachNote)}</textarea>
  </div>`;

  /* ── Step 6: Save ── */
  h += `<button onclick="saveWorkout()" id="save-btn" class="btn-primary" style="width:100%;padding:18px;border-radius:16px;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px">
    <span>💾</span> Save Workout
  </button>
  ${S.savedWorkouts[todayKey()]?`<p style="text-align:center;color:var(--text-faint);font-size:12px;margin-top:8px">Last saved: ${todayKey()}</p>`:''}`;

  return h;
}

function stepBadge(n) {
  return `<span style="min-width:24px;height:24px;padding:0 7px;background:rgba(99,77,179,0.3);border:1px solid rgba(99,77,179,0.4);color:#9988de;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">${n}</span>`;
}

// ============================================================
// SECTION RENDERER
// ============================================================
function renderSection(sec, idx) {
  const w = S.workout;
  const isFirst = idx === 0, isLast = idx === w.sections.length - 1;
  let h = `<div class="section-card fade-up" id="sec-${idx}" style="margin-bottom:10px">
    <div class="section-card-head">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="t-display" style="font-size:22px;font-weight:700;color:#9988de">${sec.letter}</span>
        <span style="font-size:13px;color:var(--text-dim)">${sec.sectionType ? (sec.sectionType.charAt(0).toUpperCase()+sec.sectionType.slice(1)) : 'Choose type'}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${!isFirst?`<button onclick="moveSection(${idx},-1)" style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">↑</button>`:''}
        ${!isLast?`<button onclick="moveSection(${idx},1)"  style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center">↓</button>`:''}
        <button onclick="deleteSection(${idx})" style="width:30px;height:30px;border-radius:8px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    </div>
    <div style="padding:14px">`;

  /* ── Type picker ── */
  h += `<div style="display:flex;gap:7px;margin-bottom:${sec.sectionType?'14px':'0'}">
    ${['single','superset','triset'].map(t=>{
      const labels = {single:'Single',superset:'Superset',triset:'Triset'};
      const sublabel = t==='single'?sec.letter : t==='superset'?`${sec.letter}1+${sec.letter}2`:`${sec.letter}1+${sec.letter}2+${sec.letter}3`;
      return `<button class="stype-btn ${sec.sectionType===t?'active':''}" onclick="setSectionType(${idx},'${t}')">
        <div style="font-size:${t==='triset'?'10':'12'}px;font-weight:700;color:#9988de;font-family:Georgia,serif;margin-bottom:3px">${sublabel}</div>
        <div style="font-size:12px;font-weight:700;color:white">${labels[t]}</div>
      </button>`;
    }).join('')}
  </div>`;

  if (sec.sectionType) {
    /* ── Exercise slots ── */
    sec.exercises.forEach((ex, ei) => {
      const slotLabel = sec.sectionType==='single' ? '' : `${sec.letter}${ei+1}`;
      const hasEx = !!ex.name;
      h += `<div style="margin-bottom:12px">
        ${slotLabel?`<div style="font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:#9988de;margin-bottom:6px">${slotLabel}</div>`:''}
        <button class="ex-pick-btn ${hasEx?'filled':''}" onclick="openPicker('exercise',${idx},${ei})">
          ${hasEx ? `<span style="font-size:15px">🏋️</span><span style="flex:1;text-align:left">${esc(ex.name)}</span><span style="font-size:12px;color:#9988de;flex-shrink:0">Change ›</span>`
                  : `<span style="font-size:18px;color:rgba(99,77,179,0.6)">+</span><span>Pick exercise…</span>`}
        </button>
        ${hasEx ? `
        <div style="margin-top:10px">
          <div class="t-label" style="margin-bottom:8px">Sets × Reps</div>
          <div class="chips-row" style="margin-bottom:8px">
            ${REPS_PRESETS.map(p=>`<button class="chip ${ex.setsReps===p?'selected':''}" onclick="pickReps(${idx},${ei},'${p}')">${p}</button>`).join('')}
            <button class="chip ${!REPS_PRESETS.includes(ex.setsReps)&&ex.setsReps?'selected':''}" onclick="pickReps(${idx},${ei},'__custom__')">Custom</button>
          </div>
          ${(!REPS_PRESETS.includes(ex.setsReps)||ex.setsReps==='')?`
          <input type="text" class="input" placeholder="e.g. 4 x 8/6/6/6" value="${esc(ex.setsReps)}"
            oninput="S.workout.sections[${idx}].exercises[${ei}].setsReps=this.value" style="font-size:14px;padding:9px 12px">`:''}
        </div>
        <div style="display:flex;gap:10px;margin-top:10px">
          ${!ex._showNote?`<button class="expand-link" onclick="toggleExField(${idx},${ei},'_showNote')">+ Note</button>`:''}
          ${!ex._showVideo?`<button class="expand-link" onclick="toggleExField(${idx},${ei},'_showVideo')">+ Video</button>`:''}
        </div>
        ${ex._showNote?`<div style="margin-top:8px"><input type="text" class="input" placeholder="Coach note…" value="${esc(ex._note||'')}" oninput="S.workout.sections[${idx}].exercises[${ei}]._note=this.value" style="font-size:13px;padding:9px 12px"></div>`:''}
        ${ex._showVideo?`<div style="margin-top:8px"><input type="text" class="input" placeholder="YouTube URL…" value="${esc(ex.youtubeUrl||'')}" oninput="S.workout.sections[${idx}].exercises[${ei}].youtubeUrl=this.value" style="font-size:13px;padding:9px 12px"></div>`:''}
        `:''}
      </div>
      ${ei < sec.exercises.length-1 ? '<div style="height:1px;background:rgba(255,255,255,0.06);margin:4px 0 14px"></div>' : ''}`;
    });

    /* ── Rest ── */
    h += `<div style="margin-top:4px">
      <div class="t-label" style="margin-bottom:8px">Rest between sets</div>
      <div class="chips-row">
        ${REST_PRESETS.map(p=>`<button class="chip ${sec.rest===p?'selected':''}" onclick="S.workout.sections[${idx}].rest='${p}';rerenderSection(${idx})">${p}</button>`).join('')}
      </div>
    </div>`;

    /* ── Section coach note ── */
    if (sec.coachNote !== undefined) {
      h += `<div style="margin-top:10px">
        <input type="text" class="input" placeholder="Section notes (optional)…" value="${esc(sec.coachNote)}"
          oninput="S.workout.sections[${idx}].coachNote=this.value" style="font-size:13px;padding:9px 12px">
      </div>`;
    }
  }

  h += `</div></div>`;
  return h;
}

// ============================================================
// LIBRARY MANAGER
// ============================================================
function renderLibrary() {
  const cats = { shoulders:'Shoulders', back_triceps:'Back & Triceps', chest_biceps:'Chest & Biceps', legs:'Leg Day', warmup:'Warmup', finisher:'Finisher' };
  return `<div>
    <h2 class="t-display" style="font-size:18px;font-weight:700;color:white;margin-bottom:4px">Exercise Library</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:18px">Add, rename, or delete exercises</p>
    <div class="card-elevated" style="margin-bottom:16px">
      <div style="font-weight:700;font-size:14px;color:white;margin-bottom:10px">+ Add Exercise</div>
      <input type="text" id="lib-name" class="input" placeholder="Exercise name" style="margin-bottom:8px">
      <select id="lib-cat" class="input" style="margin-bottom:10px">${Object.entries(cats).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
      <button onclick="addLibEx()" class="btn-primary" style="width:100%;padding:12px;border-radius:12px;font-weight:700">Add</button>
    </div>
    ${Object.entries(cats).map(([cat,label])=>`
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-weight:700;font-size:14px;color:#9988de">${label}</span>
        <span style="font-size:11px;color:var(--text-faint)">${(S.libraries[cat]||[]).length}</span>
      </div>
      ${(S.libraries[cat]||[]).map((ex,i)=>`
      <div id="librow-${cat}-${i}" style="display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <span id="libname-${cat}-${i}" style="flex:1;font-size:13px;color:var(--text)">${esc(ex)}</span>
        <button onclick="editLibEx('${cat}',${i})" style="padding:5px 10px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);font-size:11px;font-weight:600;cursor:pointer">Edit</button>
        <button onclick="delLibEx('${cat}',${i})" style="padding:5px 8px;border-radius:7px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.18);color:#f87171;font-size:11px;cursor:pointer">✕</button>
      </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

// ============================================================
// EXERCISE PICKER (BOTTOM SHEET)
// ============================================================
let _pickerCtx = null;
let _pickerQuery = '';

function openPicker(type, sIdx, eIdx) {
  _pickerCtx = { type, sIdx, eIdx };
  _pickerQuery = '';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-search').value = '';
  renderSheetList('');
  setTimeout(()=>document.getElementById('sheet-search')?.focus(), 350);
}

function closePicker() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  _pickerCtx = null;
}

function filterSheet(q) {
  _pickerQuery = q;
  renderSheetList(q);
}

function renderSheetList(q) {
  const ctx = _pickerCtx;
  if (!ctx) return;

  let exercises = [];
  const w = S.workout;

  if (ctx.type === 'warmup') {
    exercises = S.libraries.warmup || [];
  } else {
    // Primary category first
    const libKey = WORKOUT_TYPES.find(t=>t.id===w?.type)?.lib;
    const primary = libKey ? (S.libraries[libKey]||[]) : [];
    const others = [];
    Object.keys(S.libraries).forEach(k=>{
      if (k!==libKey && k!=='warmup' && k!=='finisher') {
        (S.libraries[k]||[]).forEach(e=>{ if(!primary.includes(e)) others.push(e); });
      }
    });
    exercises = [...primary, ...others];
  }

  const qLow = q.toLowerCase();
  const filtered = q ? exercises.filter(e=>e.toLowerCase().includes(qLow)) : exercises;

  const libKey = WORKOUT_TYPES.find(t=>t.id===w?.type)?.lib;
  const primary = libKey ? (S.libraries[libKey]||[]) : [];

  let html = '';
  if (!q) html += `<div class="sheet-item custom-item" onclick="pickCustom()"><span style="font-size:16px">✏️</span> Custom exercise…</div>`;

  if (!q && ctx.type !== 'warmup' && primary.length) {
    const catLabel = WORKOUT_TYPES.find(t=>t.lib===libKey)?.label || '';
    html += `<div class="sheet-section-label">${catLabel}</div>`;
    primary.forEach(e => { html += `<div class="sheet-item" onclick="selectExercise('${esc(e).replace(/'/g,"&#39;")}')">${esc(e)}</div>`; });
    const others = filtered.filter(e=>!primary.includes(e));
    if (others.length) {
      html += `<div class="sheet-section-label">All Exercises</div>`;
      others.forEach(e => { html += `<div class="sheet-item" onclick="selectExercise('${esc(e).replace(/'/g,"&#39;")}')">${esc(e)}</div>`; });
    }
  } else {
    if (filtered.length === 0) html += `<div style="padding:24px;text-align:center;color:var(--text-faint)">No matches — try a different name or use Custom</div>`;
    filtered.forEach(e => { html += `<div class="sheet-item" onclick="selectExercise('${esc(e).replace(/'/g,"&#39;")}')">${esc(e)}</div>`; });
    if (q) html += `<div class="sheet-item custom-item" style="margin-top:8px" onclick="pickCustom()">✏️ Use "${q}" as custom</div>`;
  }

  document.getElementById('sheet-list').innerHTML = html;
}

function selectExercise(name) {
  const ctx = _pickerCtx;
  if (!ctx) return;
  closePicker();
  if (ctx.type === 'warmup') {
    if (!S.workout.warmupItems.find(x=>x.name===name))
      S.workout.warmupItems.push({ name, setsReps:'' });
    render();
  } else {
    S.workout.sections[ctx.sIdx].exercises[ctx.eIdx].name = name;
    rerenderSection(ctx.sIdx);
  }
}

function pickCustom() {
  const q = _pickerQuery.trim();
  const ctx = _pickerCtx;
  closePicker();
  if (!ctx) return;

  if (ctx.type === 'warmup') {
    const name = q || prompt('Exercise name:');
    if (name) {
      S.workout.warmupItems.push({ name, setsReps:'' });
      render();
    }
  } else {
    const name = q || prompt('Exercise name:');
    if (name) {
      S.workout.sections[ctx.sIdx].exercises[ctx.eIdx].name = name;
      rerenderSection(ctx.sIdx);
    }
  }
}

// ============================================================
// ACTIONS
// ============================================================
function setWorkoutType(type) {
  if (!S.workout) S.workout = emptyWorkout(type);
  S.workout.type = type;
  render();
}

function addSection() {
  const w = S.workout;
  w.sections.push(emptySection(SECTION_LETTERS[w.sections.length]||'X'));
  render();
  // scroll to new section
  setTimeout(()=>{
    const el = document.getElementById(`sec-${w.sections.length-1}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 80);
}

function deleteSection(idx) {
  S.workout.sections.splice(idx,1);
  S.workout.sections.forEach((s,i)=>s.letter=SECTION_LETTERS[i]);
  render();
}

function moveSection(idx, dir) {
  const secs = S.workout.sections;
  const t = idx+dir;
  if (t<0||t>=secs.length) return;
  [secs[idx],secs[t]]=[secs[t],secs[idx]];
  secs.forEach((s,i)=>s.letter=SECTION_LETTERS[i]);
  render();
}

function setSectionType(idx, type) {
  const sec = S.workout.sections[idx];
  sec.sectionType = type;
  const count = type==='single'?1:type==='superset'?2:3;
  while (sec.exercises.length < count) sec.exercises.push(emptyEx());
  while (sec.exercises.length > count) sec.exercises.pop();
  rerenderSection(idx);
}

function rerenderSection(idx) {
  const el = document.getElementById(`sec-${idx}`);
  if (!el) { render(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = renderSection(S.workout.sections[idx], idx);
  el.replaceWith(tmp.firstElementChild);
}

function pickReps(sIdx, eIdx, val) {
  if (val === '__custom__') {
    S.workout.sections[sIdx].exercises[eIdx].setsReps = '';
  } else {
    S.workout.sections[sIdx].exercises[eIdx].setsReps = val;
  }
  rerenderSection(sIdx);
}

function toggleExField(sIdx, eIdx, field) {
  S.workout.sections[sIdx].exercises[eIdx][field] = !S.workout.sections[sIdx].exercises[eIdx][field];
  rerenderSection(sIdx);
}

function removeWarmupItem(i) {
  S.workout.warmupItems.splice(i,1);
  render();
}

function saveWorkout() {
  const w = S.workout;
  // Copy _note to coachNote per exercise for client display
  (w.sections||[]).forEach(sec=>{
    sec.exercises.forEach(ex=>{
      if (ex._note) ex.coachNote = ex._note;
      if (!ex.name && ex._customName) ex.name = ex._customName;
    });
    sec.type = sec.sectionType;
  });
  S.savedWorkouts[w.date] = JSON.parse(JSON.stringify(w));
  saveWorkouts();
  const btn = document.getElementById('save-btn');
  if (btn) {
    btn.innerHTML = '✓ Saved!';
    btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
    setTimeout(()=>{ btn.innerHTML = '<span>💾</span> Save Workout'; btn.style.background=''; }, 2200);
  }
}

// Library actions
function addLibEx() {
  const name = document.getElementById('lib-name').value.trim();
  const cat = document.getElementById('lib-cat').value;
  if (!name) return;
  if (!S.libraries[cat]) S.libraries[cat]=[];
  S.libraries[cat].push(name);
  saveLibraries(); render();
}
function delLibEx(cat,i) { S.libraries[cat].splice(i,1); saveLibraries(); render(); }
function editLibEx(cat,i) {
  const nameEl = document.getElementById(`libname-${cat}-${i}`);
  const row = document.getElementById(`librow-${cat}-${i}`);
  nameEl.innerHTML = `<input type="text" class="input" style="padding:5px 8px;font-size:12px" value="${esc(S.libraries[cat][i])}" id="libedit-${cat}-${i}">`;
  row.querySelector('button').textContent='Save';
  row.querySelector('button').onclick = ()=>{
    const v = document.getElementById(`libedit-${cat}-${i}`).value.trim();
    if(v){ S.libraries[cat][i]=v; saveLibraries(); render(); }
  };
}

// ============================================================
// TIMER
// ============================================================
function setTimer(s) {
  clearInterval(S.timer._iv);
  S.timer = { running:false, total:s, remaining:s, _iv:null };
  tickTimer();
}
function toggleTimer() {
  if (S.timer.remaining<=0) return;
  if (S.timer.running) {
    clearInterval(S.timer._iv); S.timer.running=false; S.timer._iv=null;
  } else {
    S.timer.running=true;
    S.timer._iv = setInterval(()=>{
      S.timer.remaining--;
      if (S.timer.remaining<=0) {
        clearInterval(S.timer._iv); S.timer.running=false; S.timer._iv=null;
        if(navigator.vibrate) navigator.vibrate([200,100,200]);
      }
      tickTimer();
    },1000);
  }
  tickTimer();
}
function resetTimer() {
  clearInterval(S.timer._iv); S.timer.remaining=S.timer.total; S.timer.running=false; S.timer._iv=null; tickTimer();
}
function tickTimer() {
  const t=S.timer;
  const num=document.getElementById('timer-num'); if(!num)return;
  const m=Math.floor(t.remaining/60), s=t.remaining%60;
  num.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  num.style.color = t.remaining<10&&t.remaining>0?'#f87171':'white';
  const ring=document.getElementById('timer-ring'); if(ring){
    const C=2*Math.PI*50, pct=t.total>0?t.remaining/t.total:0;
    ring.style.strokeDashoffset=C*(1-pct);
    ring.style.stroke=t.remaining<10&&t.remaining>0?'#ef4444':'#634DB3';
    ring.style.transition='stroke-dashoffset 1s linear';
  }
  const btn=document.getElementById('timer-btn'); if(btn) btn.textContent=t.running?'Pause':t.remaining>0?'Resume':'Start';
}

// ============================================================
// CLIENT HELPERS
// ============================================================
function getCompletionState(date,idx){ try{return !!(JSON.parse(localStorage.getItem(`kodus_complete_${date}`)||'{}')[idx]);}catch(e){return false;}}
function toggleDone(date,idx,val){ try{const k=`kodus_complete_${date}`;const d=JSON.parse(localStorage.getItem(k)||'{}');d[idx]=val;localStorage.setItem(k,JSON.stringify(d));}catch(e){}render();}
function toggleVid(btn){ const w=btn.nextElementSibling; const h=w.style.display==='none'; w.style.display=h?'block':'none'; btn.textContent=h?'▼ Hide Demo':'▶ Watch Demo'; }

function ytEmbed(url) {
  if (!url) return '';
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?]+)/) || url.match(/embed\/([^?]+)/);
  return m ? `https://www.youtube.com/embed/${m[1]}` : url;
}

function fmtDate(d) { return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============================================================
// INIT
// ============================================================
loadState();
render();
</script>
